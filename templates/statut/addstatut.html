<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Statut</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Ajouter un Statut</h1>
                        </div><!-- /.col -->
                    </div><!-- /.row -->
                </div><!-- /.container-fluid -->
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">Ajouter un Statut</div>
                        <div class="card-body">
                            <form class="form-sample" action="#" th:action="@{/statut/createstatut}" method="POST"
                                  th:object="${ville}">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Nom du statut</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" placeholder="Nom du statut"
                                                       name="nomstatut" th:required="required"/>
                                            </div>
                                            <div th:if="${existedCode != null}" class="alert alert-danger notification"
                                                 role="alert">
                                                <p>Nom existe deja</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Designation du statut</label>
                                            <div class="col-sm-9">
                                                <textarea class="form-control"  placeholder="Designation du statut"
                                                          rows="4" cols="50" name="designation" th:required="required">
                                                </textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                  <div class="col-md-6">
                                    <div class="form-group row">
                                        <label class="col-sm-3 col-form-label">Couleur Status</label>
                                        <div class="col-sm-9">
                                                <input type="color" class="form-control" name="couleur"
                                                        th:required="required"/>
                                              
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer" style="margin-top: 20px; text-align: center;">
                                    <button type="submit" class="btn btn-success" style="margin-right: 20px;">
                                        Sauvegarder
                                    </button>
                                    <button type="reset" class="btn btn-danger" style="margin-left: 20px;">
                                        Réinitialiser
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
