<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>CRM</title>
         <link rel="stylesheet" th:href="@{/css/customvariablestyle.css}" />
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <!-- Content Header (Page header) -->
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Liste des Utilisateurs ( <span th:text="${numberUser}"></span> utilisateurs )</h1>
                        </div><!-- /.col -->
                    </div><!-- /.row -->
                </div><!-- /.container-fluid -->
            </div>

            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <a href="add-user.html" th:href="@{/admin/users/add-user}"
                               class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm"
                               sec:authorize="hasAnyAuthority('ADD_USER')">
                                <i class="fas fa-plus fa-sm text-white-50"></i> Ajouter un utilisateur</a>
                                       <button
                    id="togglebutton"
                    class="d-none d-sm-inline-block btn btn-sm btn-info shadow-sm"
                  >
                    Filtre
                  </button>
                  
                            
                                 <form id="Exporter" class="d-none d-sm-inline-block btn btn-sm shadow-sm" action="#"
														th:action="@{/admin/users/Exporter}" method="GET">
													<input type="hidden" name="villes" th:value="${selectedvilles}"
															 />
															<input type="hidden" name="Nom"   th:value="${Nom}" />
															<input type="hidden" name="Prenom" th:value="${Prenom}" />
															<input type="hidden" name="refUser" th:value="${refUser}" />
															<input type="hidden" name="distributeur" th:value="${distributeur}" />
															<input type="hidden" name="datefin" th:value="${datefin}" />
															<input type="hidden" name="datedebut" th:value="${datedebut}" />
														    <input type="hidden" name="gouvernorat" th:value="${selectedGouvernorat}" />
														    <input type="hidden" name="role" th:value="${role}" /> 
														   
															
												   <button type="submit" class="btn btn-outline-info"> <i
                            class="fas fa-download fa-sm">Exporter User</i></button>
													</form> 
                        </div>
                 
                                    <form id="showMe3" method="post">
                    <div class="row">
  

                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="villes"
                          >Gouvernorat
                        </label>
                        <select
                         id="gouvernorat"
                          name="gouvernorat"
                          class="form-control"
                      
                        >
                          <option value="">Gouvernorat</option>
                          <option
                            th:each="gouvernorat : ${gouvernorats}"
                            th:value="${gouvernorat.gouvernoratId}"
                            th:text="${gouvernorat.gouvernoratName}"
                            th:selected="${gouvernorat.gouvernoratId== selectedGouvernorat}"
                          ></option>
                        </select>
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="gouvernorat"
                          >Ville</label
                        >
                        <select
                          id="villes"
                          name="villes"
                          class="form-control"
                
                        >
                          <option value="">Ville</option>
                        </select>
                      </div>

                      <div class="col-sm-6 col-md-3">
                       <label class="col-form-label" for="Nom"
                          >Nom</label>
                        <input
                          id="textsearch"
                          type="text"
                          name="Nom"
                          placeholder="Nom"
                          class="form-control"
                          th:value="${Nom}"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                          <label class="col-form-label" for="Prenom">Prenom</label>
                     
                        
                        <input
                          id="textsearch"
                          type="text"
                          name="Prenom"
                          placeholder="Prénom"
                          class="form-control"
                         th:value="${Prenom}"
                        />
                      </div>


 
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="refUser"
                          >Référence</label
                        >
                        <input
                          id="refUser"
                          type="text"
                          name="refUser"
                          placeholder="Référence User"
                          class="form-control"
                          th:value="${refUser}"
                        />
                      </div>
  					    <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="role"
                          >Role
                        </label>
                        <select
                         id="role"
                          name="role"
                          class="form-control"
                      
                        >
                          <option value="">Role</option>
                          <option
                            th:each="roleOption : ${listeRole}"
                            th:value="${roleOption.roleId}"
                            th:text="${roleOption.roleName}"
                            th:selected="${roleOption.roleId} ==  ${role}"
                            
                          ></option>
                        </select>
                      </div>

      
                    </div>
                 
                    <div class="row">
                      <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-5 col-form-label"> Date de création: du</label>
                                             <div class="col-sm-7">
                                                 <input th:if="${datedebut == null }"  type="date" class="form-control"
                                                        placeholder="Choisissez une date de début"
                                                        name="datedebut" id="datedebut"  />
                                                        
                                                         <input th:if="${datedebut != null }"  type="date" class="form-control"
                                                        placeholder="Choisissez une date de début"
                                                        name="datedebut" id="datedebut"    th:value="${datefin}"  />
                                             </div>
                                         </div>
                       </div>
                      <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-2 col-form-label">au</label>
                                             <div class="col-sm-7">
                                            
                                                 <input type="date" th:if="${datefin == null }" class="form-control"
                                                        placeholder="Choisissez une date de fin"
                                                        name="datefin" id="datefin"   />
                                                             <input th:if="${datefin != null }" type="date" class="form-control"
                                                        placeholder="Choisissez une date de fin"
                                                        name="datefin" id="datefin" 
                                                          th:value="${datefin}"  />
                                                      
                                             </div>
                                         </div>
                       </div>
                          <!--  
                         <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-6 col-form-label"> Date de modification: du</label>
                                             <div class="col-sm-6">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de début"
                                                        name="dateDebutModification" id="dateDebutModification"  />
                                             </div> 
                                         </div>
                       </div>
                      <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-2 col-form-label">au</label>
                                             <div class="col-sm-7">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de fin"
                                                        name="dateFinModification" id="dateFinModification" />
                                             </div>
                                         </div>
                       </div>     -->                
                    </div>
				<div class="text-center">
                        <button
                          class="d-none d-sm-inline-block btn btn-sm btn-success shadow-sm"
                          th:onclick="onclicksherh(event)"
                        >
                          Rechercher
                        </button>
                      </div>
                  </form>
                        <div class="card-body">
                            <!--                    <h4 class="card-title">Utilisateurs</h4>-->
                            <div class="table-responsive">
                                <table class="table display supertable  table-striped dataTable no-footer dtr-inline" id="dataTable">
                                    <thead>
                                    <tr>
                                     	<th>Code</th>
                                        <th>Nom</th>
                                        <th>Prenom</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Statut</th>
                                        <th>Actions</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                     <tr th:if="${#lists.isEmpty(users)}"><td colspan="9" class="text-center">Aucun résultat trouvé.</td></tr>                                    
                                    <tr th:each="user: ${users}">
                                    	<td th:text="${user.codeUser}"/>
                                        <td th:text="${user.firstName}"/>
                                         <td th:text="${user.lastName}"/>
                                        <td th:text="${user.email}"/>
                                        <td th:text="${user.getRole().getRoleName()}"/>
                                        <div th:switch="${user.isEnabled}">
                                            <td th:case="true"><span class="badge badge-success">Activé</span></td>
                                            <td th:case="false"><span class="badge badge-danger">Désactivé</span></td>
                                        </div>
                                        <td>
                                            <a sec:authorize="hasAnyAuthority('UPDATE_USER')"
                                               href="edit-user.html"
                                               th:href="@{|/admin/users/edituser/${user.userid}|}">
                                                <button type="button"
                                                        class="d-none d-sm-inline-block btn btn-sm btn-info shadow-sm">
                                                    Modifier
                                                </button>
                                            </a>

                                            <div sec:authorize="hasAnyAuthority('DEACTIVATE_USER')"
                                                 th:switch="${user.isEnabled}" class="d-inline-block">
                                                <a th:case="true" data-toggle="modal" data-target="#modal-warning"
                                                   th:attr="data-target='#modal-warning'+${user.userid}">
                                                    <button type="button"
                                                            class="d-none d-sm-inline-block btn btn-sm btn-danger shadow-sm">
                                                        Désactiver
                                                    </button>
                                                </a>
                                                <a th:case="false" data-toggle="modal" data-target="#modal-warning"
                                                   th:attr="data-target='#modal-warning'+${user.userid}">
                                                    <button type="button"
                                                            class="d-none d-sm-inline-block btn btn-sm btn-success shadow-sm"
                                                    >Activer
                                                    </button>
                                                </a>
                                            </div>
                                            
                                            <div sec:authorize="hasAnyAuthority('VIEW_USER_HISTORY')" class="d-inline-block">
											    <a th:href="@{'/admin/user/historique/' + ${user.userid}}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">Historique</a>
											</div>
                                          
                                        </td>
                                        <div class="modal modal-warning fade in" data-backdrop="false" tabindex="-1"
                                             role="dialog"
                                             th:id="modal-warning+${user.userid}" aria-hidden="true">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <div class="modal-header">
                                                        <button type="button" class="close" data-dismiss="modal"
                                                                aria-label="Close">
                                                            <span aria-hidden="true">×</span></button>
                                                    </div>
                                                    <div th:switch="${user.isEnabled}" class="modal-body">
                                                        <h3 th:case="false">Etes vous sure de vouloir activer cet
                                                            utilisateur ?</h3>
                                                        <h3 th:case="true">Etes vous sure de vouloir désactiver cet
                                                            utilisateur ?</h3>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <form th:action="@{'/admin/enabledisable/{id}'(id=${user.userid})}"
                                                              method="POST">
                                                            <button type="button" class="btn btn-outline pull-left"
                                                                    data-dismiss="modal">
                                                                Non
                                                            </button>
                                                            <div th:switch="${user.isEnabled}">
                                                                <button th:case="true" type="submit"
                                                                        class="btn btn-danger">
                                                                    <i class="fa fa-check"></i>&nbsp;Oui
                                                                </button>
                                                                <button th:case="false" type="submit"
                                                                        class="btn btn-success">
                                                                    <i class="fa fa-check"></i>&nbsp;Oui
                                                                </button>
                                                            </div>
                                                        </form>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                       
                        <div th:fragment="pager (pagination)">
                            <ul class="pagination">
                                <th:block th:each="pageNumber : ${body}">
                                    <li th:if="${pageNumberStat.first}" class="page-item">
                                        <a class="page-link" th:href="@{'/admin/users/allusers/'+${previous} (role=${role} , Nom=${Nom} , Prenom=${Prenom} ,  refUser=${refUser} , gouvernorat=${selectedGouvernorat} ,datedebut=${datedebut} , datefin=${datefin} )}"
                                           aria-label="Previous">
                                            <span aria-hidden="true">&laquo;</span>
                                        </a>
                                    </li>
                                    <li class="page-item active" th:if="${pageNumber} == ${thisnumber}">
                                        <a class="page-link" th:text="${pageNumber}" href="#"></a>
                                    </li>
                                    <li class="page-item disabled" th:if="${pageNumber} == -1">
                                        <a class="page-link" href="#">...</a>
                                    </li>
                                    <li class="page-item"
                                        th:if="${pageNumber} != -1 and ${pageNumber} != ${thisnumber}">
                                        <a class="page-link" th:text="${pageNumber}"
                                           th:href="@{'/admin/users/allusers/'+ ${pageNumber} (role=${role} , Nom=${Nom} , Prenom=${Prenom} ,  refUser=${refUser} , gouvernorat=${selectedGouvernorat} , datedebut=${datedebut} , datefin=${datefin} ) }">
                                        </a>
                                    </li>
                                    <li th:if="${pageNumberStat.last}" class="page-item" aria-label="Next">
                                    
                                        <a class="page-link" th:href="@{'/admin/users/allusers/'+ ${next} (role=${role} , Nom=${Nom} , Prenom=${Prenom} ,  refUser=${refUser} , gouvernorat=${selectedGouvernorat},
                                        datedebut=${datedebut} , datefin=${datefin} )}">
                                            <span aria-hidden="true">&raquo;</span>
                                        </a>
                                    </li>
                                </th:block>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <input
        type="hidden"
        name="message"
        id="message"
        th:value="${message} ?  ${message} : ''"
      />
    </section>

</section>
</body>
</html>

<script th:inline="javascript">
var messagenotif = document.getElementById("message").value;

if (messagenotif !== "" && messagenotif == "isactive") {
    $(document).Toasts("create", {
         title: "L’activation a été effectuée avec succès",
         body: "",
         class: "bg-success",
         autohide: true,
         delay: 10000,
       });	
}

if (messagenotif !== "" && messagenotif == "isnoteactive") {
    $(document).Toasts("create", {
         title: "La désactivation a été effectuée avec succès.",
         body: "",
         class: "bg-success",
         autohide: true,
         delay: 10000,
       });	
}

if (messagenotif !== "" && messagenotif == "userdited") {
	   $(document).Toasts("create", {
	        title: "La modification a été effectuée avec succès",
	        body: "",
	        class: "bg-success",
	        autohide: true,
	        delay: 10000,
	      });	
}
$("#togglebutton").click(function () {
    $("#showMe3").toggle();
  });
function onclicksherh(event) {
    //event.preventdefault()
    event.preventDefault();
 var url = "/admin/users/allusers/1";
$("#showMe3").attr("action", url);
$("#showMe3").submit();
    //$('#tutorialTable').DataTable().ajax.reload();
 
  }
$("#gouvernorat").change(function () {
    sendAjaxToChargeVilles();
  });
function sendAjaxToChargeVilles() {
    var gouvernoratid = $("#gouvernorat").val();
    if (gouvernoratid === "") {
      $("#villes").empty();
      var option = "<option value = ''>Ville</option>";
      $("#villes").append(option);
    } else {
      $.get("/client/getgouvernorats/" + gouvernoratid, function (data) {
        $("#villes").empty();
        var option = "<option value = ''>Ville</option>";
      $("#villes").append(option);
        data.forEach(function (item, i) {
          var option =
            "<option value = " +
            item.villeId +
            ">" +
            item.villeName +
            "</option>";
          $("#villes").append(option);
        });
      });
    }
  }
</script>
