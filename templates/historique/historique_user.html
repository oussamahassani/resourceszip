<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="~{layout.html}">
<head>

    <title>historique user</title>

    <!--    <link th:href="@{/vendors/datatables/dataTables.bootstrap4.min.css}" rel="stylesheet">-->

    <style type="text/css">
        :required {
            border: 2px dotted orange;
        }
    </style>

</head>

<body id="page-top">
<section layout:fragment="content">

    <!-- Page Wrapper -->
    <div id="wrapper">


        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">


                <!-- Begin Page Content -->
                <div class="container-fluid">

                    <!-- Page Heading -->
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h1 class="h3 mb-0 text-gray-800" th:text="${Message}"></h1>
                    </div>

                    <div class="card shadow mb-4">
                        <div class="card-body">
                            <form th:action="@{/List_Historique}" method="post" >
                                <div class="row">

                                    <div class="form-group col-sm">
                                        <label for="name" class="col-form-label">Selectionner Le client </label>


                                        <input  required="required" list="browsers" name="userid" class="col-sm-6 custom-select custom-select-sm">
                                        <datalist id="browsers">
                                            <option value="">--</option>
                                            <option th:each="u:${user}"
                                                    th:value="${u.email}"
                                                    th:utext="${u.email}"></option>
                                        </datalist>

                                    </div>


                                </div>


                                <div class="col-md-6">
                                    <input type="submit" class="btn btn-primary" value=" Continue ">
                                    <a th:href="historique" class="btn btn-danger">
                                        <span class="text">Annuler</span>
                                    </a>

                                </div>


                            </form>
                        </div>

                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Description</th>
                                        <th>Date Génération</th>
                                        <th>Email Client</th>
                                        <th>Référence Abonnement</th>
                                        <th>Référence Abonnement</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <tr th:each="ob:${listHistorique}">
                                        <td th:text=${ob.historique_id}></td>
                                        <td th:text=${ob.Description}></td>
                                        <td th:text="${#dates.format(ob.date, 'dd-MM-yyyy')}"></td>
                                        <td th:text=${ob.mailClient}></td>
                                        <td th:text=${ob.abonnement.reference}></td>
                                        <td th:text=${ob.facture.ref_facture}></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>

                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->


        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->
