<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="~{layout.html}">
<head>

    <title>Historique XLS</title>

    <!--    <link th:href="@{/vendors/datatables/dataTables.bootstrap4.min.css}" rel="stylesheet">-->

    <style type="text/css">
        :required {
            border: 2px dotted orange;
        }
    </style>

</head>

<body id="page-top">
<section layout:fragment="content">

    <!-- Page Wrapper -->
    <div id="wrapper">


        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">


                <!-- Begin Page Content -->
                <div class="container-fluid">



                    <div class="card shadow mb-4">
                        <div class="card-body">

                        </div>
                        <div class="row">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered display supertable table-striped dataTable no-footer dtr-inline" id="dataTable"  cellspacing="0">
                                    <thead class="table dataTable no-footer">
                                    <tr>
                                        <th>Date</th>
                                        <th>Nom de ficher</th>
                                        <th>Originale Nom de  ficher</th>
                                        <th>Succès ligne</th>
                                        <th>Erreur ligne</th>
                                        <th>Total ligne</th>
                                        <th>Creé par</th>
                                        <th>Detail</th>
                                    </tr>
                                    </thead>

                                </table>
                            </div>

                        </div>
                       </div>
                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->


        </div>
        <!-- End of Content Wrapper -->

    </div>

</section>
</body>

</html>
<script th:inline="javascript">
var oTable;
      
oTable = $("#dataTable").DataTable({
    processing: true,
    serverSide: true,
    ordering: false,
    order: [],
    responsive: {
      details: {
        type: "column",
      },
    },
    searching: false,
    fixedHeader: true,
    ajax: "/historyXls/getAllHistoryXls",
    lengthMenu: [
        [10, 20, 50 , 100 , 200,500],
        [10, 20, 50 , 100 , 200,500],
    ],

    language: {
      lengthMenu: "Affichage _MENU_ par page",
      zeroRecords: "Rien trouvé - désolé",
      emptyTable: "aucune donnée disponible",
      info: "Afficher _START_ -  _END_ de _TOTAL_ entrées ",
      infoEmpty: "Aucun enregistrement disponible",
      paginate: {
        first: "<i class='fa fa-fast-backward'></i>",
				  last: "<i class='fa  fa-fast-forward '></i>",
				  next: "<i class='fa fa-solid fa-chevron-right'></i>",
				  previous: "<i class='fa fa-solid fa-chevron-left'></i>",
      },
      search: "Chercher:",
    },
    initComplete: function (json) {
      //Make your callback here.
      //updatecheklist();
     // document.getElementById("tutorialTable_filter").style.display = "none";
    },

    columnDefs: [
      {
        className: "dtr-control",
        orderable: false,
        targets: 0,
      },
    ],

    columns: [

            {
        data: null,
        render: function (data, type, row) {
          return new Date(row.createdDate).toLocaleDateString("en-GB") ;
         
        },
      },
     

      {
        data: null,
        render: function (data, type, row) {
        	if(row.nameFile)
        		return `<a href='/xlsfile/`+row.nameFile+`' target="_blank"><i>
                                        `+row.nameFile+`</i></a>`;
      
        	else
        		
           return "";
        },
      },
      {
        data: "origineNameFile",

      },

      {
        data: "successRow",

      },

          
      {
        data: "errorRow",

      },
      {
        data: "totalRow",

      },
      {
        data: null,
        render: function (data, type, row) {
        	if(row.user)
        		return row.user.firstName+" "  + row.user.lastName + "("+ row.user.codeUser+")" ;
      
        	else
        		
           return "";
        }
      },
      {
        data: null,
        render: function (data, type, row) {
        	if(row.xlsHistoriqueFile)
        		return `<a href='/historyXls/viewdetailHistoryXls/`+row.xlsHistoriqueFile+`'><i>
                                        Details  <i class="fa fa-eye" aria-hidden="true"></i></i></a>` ;
      
        	else
        		
           return "";
        },
      },





    ],
  });
</script>
