<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"

<head>

    <title>Historique Abonnement</title>

    <style type="text/css">
        :required {
            border: 2px dotted orange;

    </style>

</head>

<body id="page-top">
<section layout:fragment="content">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">


                <!-- Begin Page Content -->
                <div class="container-fluid">

                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h1 class="h3 mb-0 text-gray-800">Historique Abonnement</h1>

                    <div class="card shadow mb-4">

                              <div class="col-sm-6 col-md-3">
                                <label class="col-form-label" for="Nom">Nom</label>
                                <input
                                  id="textsearch"

                                  name="Nom"
                                  placeholder="Nom"
                                  class="form-control"
                                  th:onchange="|onchangeSearch(event)|"
                                />
                              </div>
                              <div class="col-sm-6 col-md-3">
                                <label class="col-form-label" for="Prenom"

                                <input
                                  id="textsearch"
                                  type="text"
                                  name="Prenom"
                                  placeholder="Prénom"
                                  class="form-control"

                                />
                              </div>
                              <div class="col-sm-6 col-md-3">
                                <label class="col-form-label" for="CIN">CIN ou passport</label>

                                  id="textsearch"
                                  type="text"

                                  placeholder="CIN ou Passport"
                                  class="form-control"

                                />
                              </div>

                                >
                                <input
                                  id="textsearch"
                                  type="text"
                                  name="TEL"
                                  placeholder="Téléphone"
                                  class="form-control"
                                  th:onchange="|onchangeSearch(event)|"
                                />
                              </div> -->
                              <!-- <div class="col-sm-6 col-md-3">
                                <label class="col-form-label" for="RefTT"
                                  >Référence TT</label
                                >
                                <input
                                  id="textsearch"
                                  type="text"
                                  name="RefTT"
                                  placeholder="Référence TT"
                                  class="form-control"
                                  th:onchange="|onchangeSearch(event)|"
                                />
                              </div>
                              <div class="col-sm-6 col-md-3">
                                <label class="col-form-label" for="RefChif"
                                  >Référence</label
                                >
                                <input
                                  id="textsearch"
                                  type="text"
                                  name="RefChif"
                                  placeholder="Référence"
                                  class="form-control"
                                  th:onchange="|onchangeSearch(event)|"
                                />
                              </div> -->
        
        
        
                            </div>
                            <div class="row">
                   
                      
                              <div class="col-sm-3 mt-3">
                                <button
                                  class="d-none d-sm-inline-block btn btn-sm btn-success shadow-sm"
                                  th:onclick="onclicksherh(event)"
                                >
                                  Rechercher
                                </button>
                              </div>
                            </div>
                          </form>


                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nom</th>
                                        <th>Prenom</th>
                                        <th>cin</th>
                                        <th>Date </th>
                                        <th>Description</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <tr th:each="ob:${listehistorique}">
                                        <td th:text=${ob.demandeidHistoriques}></td>
                                        <td th:text=${ob.firstName}></td>
                                        <td th:text=${ob.lastName}></td>
                                        <td th:text=${ob.cin}></td>
                                        <td th:text="${#dates.format(ob.createdDate, 'dd-MM-yyyy')}" ></td>
                                        <td th:text=${ob.Description}></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>



                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->



        </div>
        <!-- End of Content Wrapper -->

    </div>
