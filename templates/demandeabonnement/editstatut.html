<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Modifer statut</title>
</head>
<body>
<div>
    <form th:object="${statutList}" th:fragment="content">

        <div class="modal-dialog">
            <div class="modal-content">

                &lt;!&ndash; Modal Header &ndash;&gt;
                <div class="modal-header row">
                    <div class="col-md-10">
                        <h4 class="modal-title">Modifier statut</h4>
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="close" data-dismiss="modal"
                                style="float: right;">&times;</button>
                    </div>

                </div>

                &lt;!&ndash; Modal body &ndash;&gt;
                <div class="modal-body">

                    <div class="form-group">
                        <label for="statutList">Statut</label>
                        <select id="statutList" name="statutList" class="form-control"
                                th:required="true">
                            <option th:each="categorie : ${statutList}"
                                    th:value="${categorie}"
                                    th:text="${categorie}"
                                    th:selected="${demandeAbonnement.statut == categorie}">

                            </option>
                        </select>
                    </div>

                </div>

                &lt;!&ndash; Modal footer &ndash;&gt;
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </form>
</div>
</body>
</html>
