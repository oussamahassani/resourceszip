<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Home</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
    <div class="row">
        <div class="col-12 grid-margin">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title">Modifier un client</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Catégorie</label>
                                    <div class="col-sm-9" th:text="${demande.categorieProduitInternet.categorieProduitInternetNom}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Produit</label>
                                    <div class="col-sm-9" th:text="${demande.produit.produitNom}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Nom</label>
                                    <div class="col-sm-9" th:text="${demande.lastName}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Prénom</label>
                                    <div class="col-sm-9" th:text="${demande.firstName}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Email</label>
                                    <div class="col-sm-9" th:text="${demande.email}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">CIN</label>
                                    <div class="col-sm-9" th:text="${demande.cin}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Ville</label>
                                    <div class="col-sm-9" th:text="${demande.ville.gouvernoratName}" ></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Gouvernorat</label>
                                    <div class="col-sm-9" th:text="${demande.gouvernorat.villeName}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Adresse</label>
                                    <div class="col-sm-9" th:text="${demande.adresse}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Code postale</label>
                                    <div class="col-sm-9" th:text="${demande.codepostale}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Téléphone mobile</label>
                                    <div class="col-sm-9" th:text="${demande.telMobile}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Téléphone fixe</label>
                                    <div class="col-sm-9" th:text="${demande.telFixe}"></div>
                                </div>
                            </div>
                        </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group row">
                                <label class="col-sm-3 col-form-label">Profession</label>
                                <div class="col-sm-9" th:text="${demande.profession.name}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group row">
                                <label class="col-sm-3 col-form-label">Fax</label>
                                <div class="col-sm-9" th:text="${demande.fax}"></div>
                            </div>
                        </div>
                    </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group" th:switch="${demande.photocin1}">
                                    <label >Photo Recto de la CIN</label>
                                    <br>
                                    <img th:case="null" src="/img/faces/choisiruneimage.png" id="prev1"
                                         style="height: 200px; width: 200px;"/>
                                    <img th:case="*" th:src="@{${'/demandeabonnement/'+demande.cin+'/'+demande.photocin1}}"
                                         id="prev2" style="height: 200px; width: 200px;"/>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group" th:switch="${demande.photoCin2}">
                                    <label> Photo verso de la CIN</label>
                                    <br>
                                    <img th:case="null" src="/img/faces/choisiruneimage.png" id="prev3"
                                         style="height: 200px; width: 200px;"/>
                                    <img th:case="*" th:src="@{${'/demandeabonnement/'+demande.cin+'/'+demande.photoCin2}}"
                                         id="prev4" style="height: 200px; width: 200px;"/>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 20px; text-align: center;">
                            <button type="submit" class="btn btn-success" style="margin-right: 20px;"
                                    onclick="history.go(-1);">OK</button>
                        </div>
                </div>
            </div>
        </div>
    </div>
        </div>
    </section>

</section>
</body>
</html>
