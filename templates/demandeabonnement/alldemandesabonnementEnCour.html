<!DOCTYPE html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.w3.org/1999/xhtml"
  layout:decorator="layout"
>
  <head>
    <title>Demandes D'Abonnement</title>
    <link rel="stylesheet" th:href="@{/css/customvariablestyle.css}" />
    <style>
      #checkedabonnementfixe {
  display: none;
}

    </style>
  </head>
  <body>
    <section layout:fragment="content">
      <section class="content">
        <div class="container-fluid">
          <!-- Content Header (Page header) -->
          <div class="content-header">
            <div class="container-fluid">
              <div class="row mb-2">
                <div class="col-sm-12">
                  <h1 class="m-0">Liste des abonnements en cours</h1>
                </div>
                <!-- /.col -->
              </div>
              <!-- /.row -->
            </div>
            <!-- /.container-fluid -->
          </div>

          <div class="row">
            <div class="col-12">
              <div class="card shadow mb-4">
                <div class="blocFilter">

                  <form
                    id="myForm"
                    class="form-sample"
                    method="post"
                    action=""
                    style="display: none"
                  >
                    <!--        <div th:if = "${_csrf.parameterName">
                                       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                       </div>-->
                  </form>

                  <button
                    type="button"
                    class="d-inline-block btn btn-sm bg-violet shadow-sm mb-3"
                    sec:authorize="hasAnyAuthority('UPDATE_SUBSCRIPTION_REQUEST_STATUS')"
                    th:attr="onclick=|triggerModalUploadenmasse(event)|"
                  >
                    Changer le statut des demandes
                  </button>


                  <button
                    id="togglebutton"
                    class="d-none d-sm-inline-block btn btn-sm bg-oronge shadow-sm mb-3"
                  >
                    Filtre
                  </button>

                  <form id="showMe3" method="get">
                    <div class="row">

                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="villes"
                          >Gouvernorat
                        </label>
                        <select
                          id="villes"
                          name="villes"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Gouvernorat</option>
                          <option
                            th:each="ville : ${villes}"
                            th:value="${ville.gouvernoratId}"
                            th:text="${ville.gouvernoratName}"
                          ></option>
                        </select>
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="gouvernorat"
                          >Ville</label
                        >
                        <select
                          id="gouvernorat"
                          name="gouvernorat"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Ville</option>
                        </select>
                      </div>

                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="Nom">Nom</label>
                        <input
                          id="textsearch"
                          type="text"
                          name="Nom"
                          placeholder="Nom"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="Prenom"
                          >Prénom</label
                        >
                        <input
                          id="textsearch"
                          type="text"
                          name="Prenom"
                          placeholder="Prénom"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="CIN">Identification</label>
                        <input
                          id="textsearch"
                          type="text"
                          name="CIN"
                          placeholder="Identification"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="TEL"
                          >Téléphone</label
                        >
                        <input
                          id="textsearch"
                          type="text"
                          name="TEL"
                          placeholder="Téléphone"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="RefTT"
                          >Référence TT</label
                        >
                        <input
                          id="textsearch"
                          type="text"
                          name="RefTT"
                          placeholder="Référence TT"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="RefChif"
                          >Référence</label
                        >
                        <input
                          id="textsearch"
                          type="text"
                          name="RefChif"
                          placeholder="Référence"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="professions"
                          >Profession</label
                        >
                        <select
                          id="professions"
                          name="professions"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Profession</option>
                          <option
                            th:each="profession : ${professions}"
                            th:value="${profession.professionId}"
                            th:text="${profession.name}"
                          ></option>
                        </select>
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="categories"
                          >Catégorie</label
                        >
                        <select
                          id="categories"
                          name="categories"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Catégorie</option>
                          <option
                            th:each="categorie : ${categories}"
                            th:value="${categorie.categorieProduitInternetId}"
                            th:text="${categorie.categorieProduitInternetNom}"
                          ></option>
                        </select>
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="professions"
                          >Pack</label
                        >
                        <select
                          id="produit"
                          name="produit"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Pack</option>
                        </select>
                      </div>
                    </div>
                    <div class="row">
                      <!-- <div class="col-sm-3">
                                         <div class="form-group row">
                                             <label class="col-sm-4 col-form-label">Date debut</label>
                                             <div class="col-sm-7">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de début"
                                                        name="datedebut" id="datedebut"/>
                                             </div>
                                         </div>
                                     </div>-->
                      <!-- <div class="col-sm-3">
                                         <div class="form-group row">
                                             <label class="col-sm-4 col-form-label">Date fin</label>
                                             <div class="col-sm-7">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de fin"
                                                        name="datefin" id="datefin"/>
                                             </div>
                                         </div>
                                     </div>-->
                      <div class="col-sm-3 mt-3">
                        <button
                          class="d-none d-sm-inline-block btn btn-sm btn-success shadow-sm"
                          th:onclick="onclicksherh(event)"
                        >
                          Rechercher
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <div class="card shadow mb-4">
                <div class="card-body">
                  <div>
                    <div class="blocy">
                      <table
                        id="tutorialTable"
                        class="table table-bordered display supertable table-striped dataTable no-footer dtr-inline"
                      >
                        <!-- Header Table -->
                        <thead class="table dataTable no-footer">
                          <tr>
                            <!-- <th>
                              <input
                                name="select_all"
                                value="1"
                                type="checkbox"
                              />
                            </th> -->
                            <th>Référence</th>
                            <th>Référence TT</th>
                            <th>Statut TT</th>
                            <th>Statut</th>
                            <th>CIN</th>
                            <th>Nom et prénom</th>
                            <th>Téléphone</th>
                            <th>Forfait</th>
                            <th>Date de Creation</th>
                            <th>Action</th>
                          </tr>
                        </thead>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <input
            type="hidden"
            name="message"
            id="message"
            th:value="${message} ?  ${message} : ''"
          />
          <input
            type="hidden"
            name="notfoundcalcul"
            id="notfoundcalcul"
            th:value="notfoundcalcul ?  ${notfoundcalcul} : ''"
          />
          <input
            type="hidden"
            name="tiragecalcul"
            id="tiragecalcul"
            th:value="tiragecalcul ?  ${tiragecalcul} : ''"
          />
          <input
            type="hidden"
            name="reservationcalcul"
            id="reservationcalcul"
            th:value="reservationcalcul ?  ${reservationcalcul} : ''"
          />
          <input
            type="hidden"
            name="constricutioncalcul"
            id="constricutioncalcul"
            th:value="constricutioncalcul ?  ${constricutioncalcul} : ''"
          />
          <input
            type="hidden"
            name="confirmationclientcalcul"
            id="confirmationclientcalcul"
            th:value="confirmationclientcalcul ?  ${confirmationclientcalcul} : ''"
          />
          <input
            type="hidden"
            name="etudecalcul"
            id="etudecalcul"
            th:value="etudecalcul ?  ${etudecalcul} : ''"
          />
          <input
            type="hidden"
            name="anullercalcul"
            id="anullercalcul"
            th:value="anullercalcul ?  ${anullercalcul} : ''"
          />

          <div
            class="modal fade"
            id="editModal"
            data-backdrop="false"
            tabindex="-1"
            role="dialog"
            aria-labelledby="ModalLabel"
            aria-hidden="true"
          >
            <form
              th:action="@{/demandeabonnement/editabonnement}"
              enctype="multipart/form-data"
              method="post"
            >
              <div class="modal-dialog" role="document">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Statut</h5>
                    <button
                      type="button"
                      class="close"
                      data-dismiss="modal"
                      aria-label="Close"
                    >
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>
                  <div class="modal-body">
                    <div>
                      <input
                        type="hidden"
                        name="demandeAbonnementid"
                        id="demandeAbonnementid"
                      />
                      <input
                        type="hidden"
                        name="fromlocation"
                        id="fromlocation"
                        th:value="${'tableuxencours'}"
                      />
                    </div>
                    <div class="form-group">
                      <label for="statutList">Statut</label>
                      <select
                        id="statutList"
                        name="statutList"
                        class="form-control"
                        th:required="true"
                      ></select>
                    </div>
                    <div id="showMetelefixe" class="form-group">
                      <div id="checkedabonnementfixe">
                      <label for="telefixe">Numero de téléphone fixe</label>
                      <input
                        type="number"
                        id="telefixe"
                        name="telefixe"
                        class="form-control"
                      ></input>
                    </div>
                    </div>
                    <div id="showMe" class="form-group">
                      <label for="modemList">Liste des modems</label>
                      <select
                        id="modemList"
                        name="modemList"
                        class="form-control"
                      ></select>
                    </div>
                    <div id="showMe2" class="form-group">
                      <label for="modemList">Télécharger le contrat</label>
                      <input
                        type="file"
                        accept="application/pdf"
                        className="form-control"
                        name="file"
                      />
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="btn btn-secondary"
                      onclick="cacherliste()"
                      data-dismiss="modal"
                    >
                      Fermer
                    </button>
                    <button type="submit" class="btn btn-primary">
                      Modifier
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>

          <div
            class="modal fade"
            id="uploadModal"
            data-backdrop="false"
            tabindex="-1"
            role="dialog"
            aria-labelledby="ModalLabel"
            aria-hidden="true"
          >
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="uploadModalLabel">
                    Changer le statut des demandes
                  </h5>
                  <button
                    type="button"
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <form
                  th:action="@{/demandeabonnement/uploadeditabonnementenmasse}"
                  enctype="multipart/form-data"
                  method="post"
                >
                  <div class="modal-body">
                    <div class="form-group">
                      <div class="custom-file">
                        <input
                          type="file"
                          className="form-control"
                          accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
                          name="file"
                          th:required="true"
                          id="customFile"
                        />
                        <label class="custom-file-label" for="customFile"
                          >Télécharger le fichier</label
                        >
                      </div>
                      <img src="/images/Templatechangerstatut.jpg" width="90%" />
                      <p>
                        merci de respecter cette
                        <a href="/file/TemplateChangersSatut.xlsx">template</a>
                      </p>
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="btn btn-secondary"
                      data-dismiss="modal"
                    >
                      Fermer
                    </button>
                    <button type="submit" class="btn btn-primary">
                      Télécharger
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
        <input type="hidden" name="hasediterole" th:value="${hasediterole}" id="hasediterole"/>
      </section>
    </section>
  </body>
</html>
<script th:inline="javascript">
    var chekfixeexiste = null ; 
  var oTable;
  var villes = "";
  var gouvernorat = "";
  var keyword = "";
  var professions = "";
  var categories = "";
  var produit = "";
  var TEL = "";
  var Nom = "";
  var Prenom = "";
  var CIN = "";
  var RefTT = "";
  var RefChif = "";
  /*<![CDATA[*/

  var listedes_ids = /*[[${listedes_ids}]]*/ "default";
  var userrole = /*[[${userrole}]]*/ "default";

  /*]]>*/
  var hasediterole = document.getElementById("hasediterole").value;
  function updatecheklist() {
    if (listedes_ids.length !== 0) {
      listedes_ids.forEach(function (item, index, array) {
        var elem = document.getElementById(item);
        if (elem !== null) {
          document.getElementById(item).checked = true;
        }
      });
    }
  }

  $("#downloadenmasse").click(function (e) {
    e.preventDefault();
    if (listedes_ids.length !== 0) {
      var url = "/demandeabonnement/extractenmasse";
      $("#myForm").attr("action", url);
      $("#myForm").submit();
    } else {
      if (!alert("Veuillez selectionner les demandes à extraire")) {
        window.location.reload();
      }
    }
  });
  function toggleCheckboxajax(column) {
    var data = oTable.row($(column).parents("tr")).data();
    this.toggleCheckbox(column, data.demandeId);
  }
  function toggleCheckbox(element, id) {
    if (element.checked === true) {
      $.ajax({
        type: "POST",
        contentType: "application/json",
        url: "/demandeabonnement/addid",
        data: JSON.stringify(id),
        dataType: "json",
        timeout: 100000,
        success: function (data) {
          listedes_ids.push(id);
          updatecheklist();
          //document.location.reload(true)
        },
        error: function (e) {
          console.log("ERROR: ", e);
        },
      });
    } else {
      $.ajax({
        type: "POST",
        contentType: "application/json",
        url: "/demandeabonnement/removeid",
        data: JSON.stringify(id),
        dataType: "json",
        timeout: 100000,
        success: function (data) {
          let newelm = listedes_ids.filter((el) => el !== id);
          listedes_ids = newelm;
        
          updatecheklist();
          // document.location.reload(true)
        },
        error: function (e) {
          console.log("ERROR: ", e);
        },
      });
    }
  }

  function cacherliste() {
    var hiddenDiv = document.getElementById("showMe");
    var hiddenDiv2 = document.getElementById("showMe2");
    var checkedabonnementfixe =  document.getElementById("checkedabonnementfixe");
    checkedabonnementfixe.style.display =  "none"
    hiddenDiv.style.display = "none";
    hiddenDiv2.style.display = "none";
  }
  function onchangeSearch(event) {
    let name = event.target.name;

    switch (name) {
      case "villes": {
        villes = event.target.value;
        if (villes == "") gouvernorat = "";
        break;
      }
      case "gouvernorat": {
        gouvernorat = event.target.value;

        break;
      }
      case "keyword": {
        keyword = event.target.value;
        break;
      }
      case "professions": {
        professions = event.target.value;
        break;
      }
      case "categories": {
        categories = event.target.value;
        break;
      }
      case "produit": {
        produit = event.target.value;
        break;
      }
      case "RefChif": {
        RefChif = event.target.value;
        break;
      }
      case "RefTT": {
        RefTT = event.target.value;
        break;
      }
      case "CIN": {
        CIN = event.target.value;
        break;
      }
      case "Prenom": {
        Prenom = event.target.value;
        break;
      }
      case "Nom": {
        Nom = event.target.value;
        break;
      }
      case "TEL": {
        TEL = event.target.value;
        break;
      }
    }
  }
  function onclicksherh(event) {
    event.preventDefault();

    $("#tutorialTable")
      .DataTable()
      .column(0)
      .search(
        JSON.stringify({
          gouvernorat: gouvernorat,
          professions: professions,
          categories: categories,
          produit: produit,
          villes: villes,
          refChif: RefChif,
          refTT: RefTT,
          cin: CIN,
          prenom: Prenom,
          nom: Nom,
          tel: TEL,
          datedebut:"",
          datefin : "",
        })
      )
      .draw();
  }
  function showdetailsajax(column) {
    var data = oTable.row($(column).parents("tr")).data();
    let href =
      "/demandeabonnement/getdemandeabonnementtoimprimer/" + data.demandeId;
    window.location.href = href;
  }

  function triggerModalajax(column) {
    let abonement = {};
    var data = oTable.row($(column).parents("tr")).data();
    chekfixeexiste = data.telFixe ; 
    let url = "/demandeabonnement/changerstatutabonnement/" + data.demandeId;
    $.get(url, function (selecteditem) {
      $.get("/demandeabonnement/getmodems", function (listmodems) {
        $("#modemList").empty();
        listmodems.forEach(function (item, i) {
          var option =
            "<option value = " +
            item.modemId +
            ">" +
            item.numSerie +
            "</option>";
          $("#modemList").append(option);
        });
        document.getElementById("demandeAbonnementid").value = data.demandeId;
        $.get("/demandeabonnement/getallstatusabonnement", function (data) {
          $("#statutList").empty();
          data.forEach(function (item, i) {
            if (item.statutId === selecteditem.statutId) {
              var option =
                "<option selected='selected' value = " +
                item.statutId +
                ">" +
                item.designation +
                "</option>";
              $("#statutList").append(option);
            } else {
              var option =
                "<option value = " +
                item.statutId +
                ">" +
                item.designation +
                "</option>";
              $("#statutList").append(option);
            }
          });
        });
      });
    });
    $("#editModal").modal();
  }
  function triggerModal(id, e) {
    var url = "/demandeabonnement/changerstatutabonnement/" + id;

    e.preventDefault();
    $.get(
      "/demandeabonnement/changerstatutabonnement/" + id,
      function (selecteditem) {
        $.get("/demandeabonnement/getmodems", function (listmodems) {
          $("#modemList").empty();
          listmodems.forEach(function (item, i) {
            var option =
              "<option value = " +
              item.modemId +
              ">" +
              item.numSerie +
              "</option>";
            $("#modemList").append(option);
          });
          document.getElementById("demandeAbonnementid").value = id;
          $.get("/demandeabonnement/getallstatusabonnement", function (data) {
            $("#statutList").empty();
            data.forEach(function (item, i) {
              if (item.statutId === selecteditem.statutId) {
                var option =
                  "<option selected='selected' value = " +
                  item.statutId +
                  ">" +
                  item.designation +
                  "</option>";
                $("#statutList").append(option);
              } else {
                var option =
                  "<option value = " +
                  item.statutId +
                  ">" +
                  item.designation +
                  "</option>";
                $("#statutList").append(option);
              }
            });
          });
        });
      }
    );
    $("#editModal").modal();
  }

  function triggerModalUploadenmasse(e) {
    e.preventDefault();

    $("#uploadModal").modal();
  }
  var elem = document.getElementById("statutList");
  elem.onchange = function () {
    var hiddenDiv = document.getElementById("showMe");
    var hiddenDiv2 = document.getElementById("showMe2");
    var checkedabonnementfixe =  document.getElementById("checkedabonnementfixe");
    checkedabonnementfixe.style.display =  chekfixeexiste== null && this.value == "279"? "block" : "none";
    hiddenDiv.style.display = this.value !== "280" ? "none" : "block";
    hiddenDiv2.style.display = this.value !== "281" ? "none" : "block";
  };

  function sendAjaxRequest() {
    var villeid = $("#villes").val();

    if (villeid === "") {
      $("#gouvernorat").empty();
      var option = "<option value = ''>Ville</option>";
      $("#gouvernorat").append(option);
    } else {
      $.get("/client/getgouvernorats/" + villeid, function (data) {
        $("#gouvernorat").empty();
        var option = "<option value = ''>Ville</option>";
      $("#gouvernorat").append(option);
        data.forEach(function (item, i) {
          var option =
            "<option value = " +
            item.villeId +
            ">" +
            item.villeName +
            "</option>";
          $("#gouvernorat").append(option);
        });
      });
    }
  }


  function sendAjaxRequest2() {
	    var option = "<option value = ''>Pack</option>";
	    var categorieid = $("#categories").val();
	    if (categorieid === "") {
	      $("#produit").empty();

	      $("#produit").append(option);
	    } else {
	      $.get("/pack/packByCategory/" + categorieid, function (data) {
	        $("#produit").empty();
	        $("#produit").append(option);
