<!DOCTYPE html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.w3.org/1999/xhtml"
  layout:decorator="layout"
>
  <head>
    <title>Type d'engagements</title>
  </head>
  <body>
    <section layout:fragment="content">
      <section class="content">
        <div class="container-fluid">
          <!-- Content Header (Page header) -->
          <div class="content-header">
            <div class="container-fluid">
              <div class="row mb-2">
                <div class="col-sm-6">
                  <h1 class="m-0">Liste des types d'engagements</h1>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12 grid-margin">
              <div class="card shadow mb-4">
         <div class="card-header py-3">
                            <a href="" th:href="@{/parameters/createEngagement}"
                               class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm" >
                                <i class="fas fa-plus fa-sm text-white-50"></i> Ajouter un type d'engagement</a>
                        </div>
                <div class="card-body">
                  <div>
                    <table id="tutorialTable" class="table table-bordered display supertable  table-striped  no-footer dtr-inline">
                      <!-- Header Table -->
                      <thead class="table">
                       
                          <th>Nom</th>
                          <th>Nombre</th>
                          <th>Date de création</th>
                          <th>Action</th>
                   
                    </thead>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <input type="hidden" name="hasediterole" th:value="${hasediterole}" id="hasediterole"/>
        </div>
      </section>
    </section>
  </body>
</html>
<script th:inline="javascript">
  var oTable;
  var hasediterole = document.getElementById("hasediterole").value;
  function updateModalajax(column) {
    var data = oTable.row($(column).parents("tr")).data();
    let href = "/parameters/editengagement/" + data.engagementId;
    window.location.href = href;
  }
  $(document).ready(function () {
    oTable = $("#tutorialTable").DataTable({
      language: {
        lengthMenu: "Affichage _MENU_ enregistrements par page",
        zeroRecords: "Rien trouvé - désolé",
        info: "Afficher la page _PAGE_ de _PAGES_",
        infoEmpty: "Aucun enregistrement disponible",
        paginate: {
          first: "Première",
          last: "Dernière",
          next: ">>",
          previous: "<<",
        },
      },
      processing: true,
      serverSide: true,
      ordering: true,
     
      searching: false,
     // scrollY: 500,
      ajax: "/parameters/getallengagements",
      lengthMenu: [
        [20, 30, 50],
        [20, 30, 50],
      ],
      columnDefs: [
        {
          orderable: false,
          targets: [2, 3],
        },
      ],

      columns: [
        {
          data: null,
          render: function (data, type, row) {

            return row.nomEngagement;
          },
        },
        {
          data: null,
          render: function (data, type, row) {
            return row.nombre;
          },
        },
           {
			  data: null,
			  render: function (data, type, row) {
			    const date = new Date(row.createdDate);
			    const pad = (n) => n.toString().padStart(2, '0');
			    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
			  },
			},
          {
            data: null,
            render: function (data, type, row) {
              if(hasediterole == "true"){
              return "<div>" +
            " <i style='cursor:pointer' onclick='updateModalajax(this)' " +
            "class='fa  fa-edit  fa-2x icons-header-color d-none d-sm-inline-block btn btn-sm btn-info shadow-sm' " +
            "aria-hidden='true'></i>" +
            "</div>";
            }
            else
            return " "
            
          },
          },
      ],
    });
    //$('.dataTables_paginate').addClass('btn btn-sm btn-dark');
   $("#pageSizeSelect").change(function () {
      var pagesizeselected = $("#pageSizeSelect").val();
      window.location.replace("/parameters/allengagements/1/" + pagesizeselected);
    });
  });
</script>
