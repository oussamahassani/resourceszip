<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Modifier un type d'engagement</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Modifier un type d'engagement</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">Modifier un type d'engagement</div>
                        <!-- Error message if category type already exists -->
                                <div th:if="${existedName != null}" class="alert alert-danger" role="alert">
                                    <p>Type d'engagement existe déjà: <span th:text="${existedName}"></span></p>
                                </div>
                        <div class="card-body">
                            <form class="form-sample" th:action="@{/parameters/editengagement/{id}(id=${engagement.engagementId})}" 
                                  method="POST" th:object="${engagement}">
                                <!-- Hidden ID Field (Optional) -->
                                <input type="hidden" th:field="*{engagementId}" />

                                <!-- Category Type -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Nom de l'engagement</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" placeholder="Nom de l'engagement"
                                                       name="nomEngagement" th:field="*{nomEngagement}" required />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                

                                <!-- Designation -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Nombre</label>
                                            <div class="col-sm-9">
                                                <input class="form-control" placeholder="Nombre de mois de l'ngagement"
                                                          rows="4" cols="50" name="nombre"
                                                          th:field="*{nombre}" required />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Buttons -->
                                <div class="card-footer" style="margin-top: 20px; text-align: center;">
                                    <button type="submit" class="btn btn-success" style="margin-right: 20px;">
                                        Sauvegarder
                                    </button>
                                    <a href="/parameters/allengagements/1/20" class="btn btn-danger" style="margin-left: 20px;">
                                        Annuler
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
