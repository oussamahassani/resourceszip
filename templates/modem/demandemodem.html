<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Demande Modeme</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
	<style>
		.is-invalid {
			color: red;
		}
	</style>
</head>
<body>
<section layout:fragment="content">
<div th:replace="/fragments/loader.html :: loader"></div>

		    <div class="row">
				<div class="card w-50 ml-auto mr-auto mt-5 p-5">
				    <form class="modem-request-form" id="myForm" action="#" th:action="@{/sendMailDemande}" method="POST">
						  <h2 class="text-center">Demande des Modems</h2>						  
						  <div class="form-group">
						    <label for="quantity">Quantité :</label>
						    <input type="number" name="quantite" id="quantite" placeholder="Veuillez saisir la quantité de modems dont vous avez besoin."  class="form-control" min="1" required>
						  </div>						  
							<div class="form-group">
							  <label>Type de Modem :</label>
							  <div th:each="cat : ${listCat}">
							    <div class="form-check mt-2">
							      <input class="form-check-input" type="radio" name="radiotype" th:id="${cat.categorieProduitInternetCode}" th:value="${cat.categorieProduitInternetCode}" required>
							      <label class="form-check-label" th:for="${cat.categorieProduitInternetCode}" th:text="${cat.categorieProduitInternetNom}"></label>
							    </div>
							  </div>
							</div>
						   <input type="hidden" name="username" th:value="${userfullname}" />
						  <button type="submit" class="btn btn-primary">Envoyer</button>
					</form>
				 </div> 
		    </div>
  

</section>
</body>
</html>
<script th:inline="javascript">
	
$(document).ready(function() {
	  $('#myForm').validate({
	    // Validation des règles et des messages
	    errorElement: 'div',
	    errorClass: 'is-invalid',
	    rules: {
	      quantite: {
	        required: true,
	        number: true,
	        min: 1
	      },
	      radiotype: {
	        required: true
	      }
	    },
	    messages: {
	      quantite: {
	        required: 'Veuillez entrer une quantité.',
	        number: 'La quantité doit être un nombre.',
	        min: 'La quantité doit être supérieure à zéro.'
	      },
	      radiotype: {
	        required: 'Veuillez sélectionner une option.'
	      }
	    },
	    errorPlacement: function(error, element) {
	      if (element.attr("name") == "quantite") {
	        error.insertAfter(element);
	      }
	      if  (element.attr("name") == "radiotype"){
	        error.insertAfter(element.parent().next());
	      }
	    },
	    // Lorsque le formulaire est valide
	    submitHandler: function(form) {
	      // Ajouter la classe qui affiche le chargeur
	      $('.loader-container').show();
	      // Envoyer le formulaire
	      form.submit();
	    }
	  });
	});

	


</script>
