<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="~{layout.html}">
<head>

    <title>Historique Abonnement</title>

    <!--    <link th:href="@{/vendors/datatables/dataTables.bootstrap4.min.css}" rel="stylesheet">-->

    <style type="text/css">
        :required {
            border: 2px dotted orange;
        }
    </style>

</head>

<body id="page-top" th:fragment="Informationhistorylist(historylist)">
<section layout:fragment="content">

    <!-- Page Wrapper -->
    <div id="wrapper">


        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">


                <!-- Begin Page Content -->
                <div class="container-fluid">

                    <!-- Page Heading -->

                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h1 class="h3 mb-0 text-gray-800">Historique Abonnement</h1>

                    </div>


                    <!-- DataTales Example -->
                    <div class="card shadow mb-4">




                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nom</th>
                                        <th>Prenom</th>
                                        <th>cin</th>
                                        <th>Date </th>
                                        <th>Description</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <tr th:each="ob:${historylist}">
                                        <td th:text=${ob.demandeidHistoriques}></td>
                                        <td th:text=${ob.firstName}></td>
                                        <td th:text=${ob.lastName}></td>
                                        <td th:text=${ob.cin}></td>
                                        <td th:text="${#dates.format(ob.createddate, 'dd-MM-yyyy')}"></td>
                                        <td th:text=${ob.Description}></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>



                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->



        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

</section>




</body>

</html>
