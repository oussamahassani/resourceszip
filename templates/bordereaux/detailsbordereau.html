<!DOCTYPE HTML>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:th="http://www.w3.org/1999/xhtml" layout:decorator="layout">
<head>
    <meta charset="utf-8"></meta>


    <title>Bordereaux Detail </title>


</head>

<body>
	<section layout:fragment="content">
		<div class="col-sm-12">
			<div class="card-block">
				<h4>Informations Bordereau 
				</h4>
<div class="row" th:if="${bordereau.typeDePayement != null}">
					<label class="col-sm-4 col-form-label">Type de Payement:</label>
					<div class="col-sm-8" th:text="${bordereau.typeDePayement}"></div>

				</div>
				<div class="row">
					<label class="col-sm-4 col-form-label">Date de création:</label>
					<div class="col-sm-8" th:text="${#dates.format(bordereau.createdDate, 'dd-MM-yyyy')}"></div>

				</div>
	<div class="row">
					<label class="col-sm-4 col-form-label">Date de versement:</label>
					<div th:if="${bordereau.dateVersement != null}" class="col-sm-8" th:text="${#dates.format(bordereau.dateVersement, 'dd-MM-yyyy')}"></div>

				</div>
				
					<div class="row">
					<label class="col-sm-4 col-form-label">Date de validation:</label>
					<div th:if="${bordereau.dateValidationBrd != null}" class="col-sm-8" th:text="${#dates.format(bordereau.dateValidationBrd, 'dd-MM-yyyy')}"></div>

				</div>
				<div class="row">
					<label class="col-sm-4 col-form-label">Date upload justificatif de versement:</label>
					<div th:if="${bordereau.dateUplodeJustificatif != null}" class="col-sm-8" th:text="${#dates.format(bordereau.dateUplodeJustificatif, 'dd-MM-yyyy')}"></div>

				</div>
				<div class="row">
					<label class="col-sm-4 col-form-label">Crée par:</label> <span
						class="col-sm-2" name="creepar"
						th:text="${bordereau.user.firstName}"></span> <span
						class="col-sm-2" name="categories"
						th:text="${bordereau.user.lastName}"></span>
				</div>

				<div class="row">
					<label class="col-sm-4 col-form-label">Montant:</label>
					<div class="col-sm-8" name="montant"
						th:text="${#numbers.formatDecimal(bordereau.montant, 1, 'COMMA', 3, 'POINT')}+' DTN'"></div>
				</div>
				<div class="row">
					<label class="col-sm-4 col-form-label">Nombre des factures:</label>
					<div class="col-sm-8" th:text="${bordereau.numfacure}"></div>

				</div>

				<div class="row">
					<label class="col-sm-4 col-form-label">Confirmer par :</label>
					<div  th:if="${bordereau.checkBy != null}" class="col-sm-8" th:text="${bordereau.checkBy.firstName} + ' ' + ${bordereau.checkBy.lastName}"></div>

				</div>
						 <div class="col-sm-12"  th:if="${bordereau.status} == 'versement confirmé' and ${avancepayee} != null">
					 <div class="row">
						<label class="col-sm-4 col-form-label">Avance  Validée :</label>
						<div class="col-sm-8" th:text="${avancepayee}"></div>
                      </div>
                         	<div class="row" th:if=" ${resteApayee} != null">
						<label class="col-sm-4 col-form-label">Net à Reverser:</label>
						<div class="col-sm-8" th:text="${resteApayee}"></div>
                      </div>
					</div>
				<div class="row" th:if="${bordereau.photoRecu} != null ">
					<label class="col-sm-4 col-form-label">Justificatif de versement  :</label> <a
						th:href="@{/{urljustification}(urljustification=${urljustification})}">
						<img
						th:src="@{${'/bordereau/'+bordereau.bordereauId+'/'+bordereau.photoRecu}}"
						id="prev4" style="height: 200px; width: 200px" />
					</a>

				</div>
			</div>
			<button onclick="pdfBordereauform()"
		 class="d-inline-block btn btn-sm btn-info shadow-sm mb-3" style="margin-top: 11px;"><i class="fa fa-download"></i>
					<input id="idbordereau" type="hidden" th:value="${bordereau.bordereauId}">Télécharger PDF Bordereau </button>
			<table class="table table-bordered" id="dataTable" width="100%"
				cellspacing="0">
				<thead>
						<tr>
							<th>Type</th>
							<th>Reference</th>
							<th>Montant à payer (DTN)</th>
							<th>Date echeance</th>
						
						</tr>
					</thead>
				<tbody>
						<tr  th:each="ob:${listeentryBordereau}">
							<td th:if="${ob.encaissement.facture} != null">Facture</td>
							<td th:if="${ob.encaissement.AvoirClient} != null">Avoir</td>
							
							<td th:if="${ob.encaissement.facture} != null" th:text=${ob.encaissement.facture.ref_facture} name="ref"></td>
							<td th:if="${ob.encaissement.AvoirClient} != null" th:text=${ob.encaissement.AvoirClient.refAvoirClient} name="ref"></td>
							
							<td th:if="${ob.encaissement.facture} != null" th:text="${#numbers.formatDecimal(ob.encaissement.facture.montant_payer, 1, 'COMMA', 3, 'POINT')}"></td>
							<td th:if="${ob.encaissement.AvoirClient} != null"  th:text="${#numbers.formatDecimal(ob.encaissement.AvoirClient.montantAvoir, 1, 'COMMA', 3, 'POINT')}"></td>
							
							<td th:if="${ob.encaissement.facture} != null" th:text="${#dates.format(ob.encaissement.facture.date_echeance, 'dd-MM-yyyy')}"></td>
							<td th:if="${ob.encaissement.AvoirClient} != null">---</td>
							
							
						</tr>
					</tbody>
			</table>
		</div>

</section>

</body>
</html>
<script th:inline="javascript">
function pdfBordereauform(){

	var idbordereau = document.getElementById("idbordereau").value;
	   let a = document.createElement("a");
			a.setAttribute("style", "display: none");
			a.href = "/bordereau/imprimerBordereauA4/"+idbordereau;
			a.target = "_blank";
	   a.click();
	
		}
		
		</script>
