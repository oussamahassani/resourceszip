<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Ajouter  Avoir Client </title>
        <link rel="stylesheet" th:href="@{/css/customvariablestyle.css}" />
        <link rel="stylesheet" href="https://rawgit.com/swisnl/jQuery-contextMenu/master/dist/jquery.contextMenu.css" />
</head>
<body>
<section layout:fragment="content">
<!-- Loader -->
<div th:replace="/fragments/loader.html :: loader"></div>

    <section class="content">
        <div class="container-fluid">

    <div >
        <div class="col-12 grid-margin">
        
            <div class="card">
                       <h4 class="card-title  m-3">Modifer  un Avoir</h4>            
<div class="card-body">
		   
<div id="formContainer" class="row m-2">
<form class="cloned-form-sample p-1 rounded border border-light col-md-6" id="clonedForm1" action="#" th:action="@{/AvoirClient/saveEditAvoirClient}"  method="POST" >

				
						
						
						<input  type="hidden"  name="avoirId" id="avoirId" th:value="${avoir.avoirId}"  /> 

						<div class="col-md-10">
    							<div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Reference Avoir</label>
                                    <div class="col-sm-9">
                                        <span   th:text="${avoir.refAvoirClient}"> </span>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Montant Ht</label>
                                    <div class="col-sm-9">
                                        <span  th:text="${avoir.montantHt}"></span>
                                    </div>
                                </div>
                            </div>
    					<div class="col-md-10">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">% TVA</label>
                                    <div class="col-sm-9">
                                        <span th:text="${avoir.baseTva}" > </span>
                                    </div>                                    
                                </div>
                            </div>
    					<div class="col-md-10">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Montant TVA</label>
                                    <div class="col-sm-9">
                                    <span th:text="${avoir.montantTva}" > </span>
                                    
                                      
                                    </div>
                                </div>
                            </div>
                            
    					<div class="col-md-10">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Total TTC</label>
                                    <div class="col-sm-9">
                                       <span th:text="${avoir.montantAvoir}" > </span>
                                        
                                    </div>
                                  
                                </div>
                            </div>


                   
                  
                          <div class="row">

                            <div class="col-md-4 border-left border-light pl-3">
                            	<label class="col-sm-12 mt-2 col-form-label">Statut Avoir :</label>
                                  
                                  <div class="form-group col">                                   
             
                                    <div class="col-sm-10">
                                        <div class="form-radio">
                                            <label class="form-check-label" >
                                                <input  type="radio" style="opacity: 1 !important;" class="form-check-input" name="IsClientPayed" id="membershipRadios1" value="True" checked > Avoir Payé
                                            </label>
                                        </div>
                                        <div id="selectForm" class="ml-3 mt-3" >
                                        <label class="col-sm-6 col-form-label">Payé par : </label>
				                           <input list="listRev" 
				                           			class="form-control" 
				                           			autocomplete="off" 
				                           			type="text" 
				                           			name="rev" 
				                           			id="rev" 				                           			
				                           			placeholder="Veuillez entrer le nom / code de revendeur"
				                           			th:onchange="validationDataList(event);">
				                           			
											<datalist id="listRev">
											<option th:each="u:${revendeur}"
						                             th:value="${u.codeUser}"
				        							 th:text="${u.firstName + ' ' + u.lastName + (u.nomCommercial != null ? ' ' + u.nomCommercial : '')}">
						                     </option>
											</datalist>
											<div class="text-danger" id="alertContainer"></div>
											<div class="form-group row mt-3">
												<label class="col-sm-12 mt-2 col-form-label">Autorisation d'utilisation dans la création de bordereau  : </label>
				                                    <div class="col-sm-5 mb-3 ml-4">
				                                        <div class="form-radio">
				                                            <label class="form-check-label">
				                                                <input type="radio" style="opacity: 1 !important" class="form-check-input" name="isUsedBrd" id="isUsedBrd" value="True" > Oui		                                            
				                                            </label>
				                                        </div>
				                                    </div>
				                                    <div class="col-sm-5">
				                                        <div class="form-radio">
				                                            <label class="form-check-label">
				                                                <input type="radio" style="opacity: 1 !important" class="form-check-input" name="isUsedBrd" id="isUsedBrd" value="False" > Non				                                            
				                                            </label>
				                                        </div>
				                                    </div>
				                                 
			                                  </div>
			                                  								  
										</div>
                                    </div>

                                </div>
                            </div>

                       </div>

                        	<div style="margin-top: 20px; text-align: center">
										<button type="submit" class="btn btn-success"
											style="margin-right: 20px">
											Modifier</button>
										<button type="reset" class="btn btn-danger"
											style="margin-left: 20px" onclick="history.go(-1);">
											Annuler</button>
									</div>
             
						
                    </form>
                </div>
            </div>
        </div>
    </div>
        </div>
        </div>
        <input type="hidden" name="message" id="message"
					th:value="${message} ?  ${message} : ''" />
    </section>
</section>
</body>
</html>

<script th:inline="javascript">
var messagenotif = document.getElementById("message").value ;
if (messagenotif !== "") {
 	$(document).Toasts('create', {
		  title: "Erreur",
		  body: messagenotif,
		  class: 'bg-danger',
		  autohide:true,
		  delay: 10000
		})
}

</script>
