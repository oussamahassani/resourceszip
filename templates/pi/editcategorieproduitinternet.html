<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Home</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Modifier une Categorie</h1>
                        </div><!-- /.col -->
                    </div><!-- /.row -->
                </div><!-- /.container-fluid -->
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">Modifier une categorie</div>
                        <div class="card-body">
                            <form class="form-sample" id="form-sample" action="#" method="POST" th:object="${categorieproduitinternet}"
                                  th:action="@{|/pi/editcategorieproduitinternet/${categorieproduitinternet.categorieProduitInternetId}|}">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Nom de la categorie</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control"
                                                       name="categorieProduitInternetNom"
                                                       th:required="required"
                                                       th:field="${categorieproduitinternet.categorieProduitInternetNom}"/>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Code de la categorie</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control"
                                                       name="categorieProduitInternetCode"
                                                       th:required="required"
                                                       th:field="${categorieproduitinternet.categorieProduitInternetCode}"/>
                                                <div th:if="${existedCode != null}"
                                                     class="alert alert-danger notification"
                                                     role="alert">
                                                    <p>Code existe deja</p>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer" style="margin-top: 20px; text-align: center;">
                                    <button type="submit" class="btn btn-success" style="margin-right: 20px;">Valider
                                    </button>
                                    <button type="reset" class="btn btn-danger" style="margin-left: 20px;"
                                            onclick="history.go(-1);">Annuler
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
<script th:inline="javascript">
    $( document ).ready( function () {
        $( "#form-sample" ).validate( {
            rules: {
                categorieProduitInternetCode: {
                    required: true,
                    minlength: 2
                },
                categorieProduitInternetNom: {
                    required: true,
                    minlength: 3
                },
             
            
            },
            messages: {
            
                categorieProduitInternetCode: {
                    required: "Ce champ est obligatoire",
                    minlength: "Veuillez entrer un code categorie valide"
                },
                categorieProduitInternetNom: {
                    required: "Ce champ est obligatoire",
                    minlength: "Veuillez entrer un Nom valide"
                },
                
    
            },
            errorElement: "em",
            errorPlacement: function ( error, element ) {
                // Add the `invalid-feedback` class to the error element
                error.addClass( "invalid-feedback" );
    
                if ( element.prop( "type" ) === "checkbox" ) {
                    error.insertAfter( element.next( "label" ) );
                } else {
                    error.insertAfter( element );
                }
            },
            highlight: function ( element, errorClass, validClass ) {
                $( element ).addClass( "is-invalid" ).removeClass( "is-valid" );
            },
            unhighlight: function (element, errorClass, validClass) {
                $( element ).addClass( "is-valid" ).removeClass( "is-invalid" );
            }
        } );
    
        $.validator.setDefaults( {
        submitHandler: function (form) {
        
             form.submit()
        }
    } );
    
    } );
    
    </script>
