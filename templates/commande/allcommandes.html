<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Commandes</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <!-- Content Header (Page header) -->
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Liste des Commandes</h1>
                        </div><!-- /.col -->
                    </div><!-- /.row -->
                </div><!-- /.container-fluid -->
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered">
                                    <thead>
                                    <tr>
                                        <th>CIN</th>
                                        <th>Nom</th>
                                        <th>Prenom</th>
                                        <th>Téléphone</th>
                                        <!-- <th>Produit</th> -->
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="c: ${commandes}">
                                        <td th:text="${c.client.cin}"/>
                                        <td th:text="${c.client.lastName}"/>
                                        <td th:text="${c.client.firstName}"/>
                                        <div th:switch="${c.client.telFixe}">
                                            <td th:case="null" th:text="${c.client.telMobile}"/>
                                            <td th:case="*" th:text="${c.client.telMobile +' || ' + c.client.telFixe}"/>
                                        </div>
                                       <!--   <td>
                                            <table>
                                                <tbody>
                                              <tr th:each = "p: ${c.entries}">
                                                      <td th:text = "${p.produit.produitNom}"></td>
                                                   <td th:text = "${p}"></td>
                                                </tr>
                                                </tbody>
                                            </table>
                                        </td>-->
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="row">
                        <div class="form-group col-md-1" style="margin-left: 20px;">
                            <select class="form-control pagination" id="pageSizeSelect">
                                <option th:each="pageSize : ${pageSizes}" th:text="${pageSize}"
                                        th:value="${pageSize}"
                                        th:selected="${pageSize} == ${selectedPageSize}"
                                ></option>
                            </select>
                        </div>
                        <div th:fragment="pager (pagination)" class="form-group col-md-10 pagination-centered">
                            <ul class="pagination">
                                <th:block th:each="pageNumber : ${body}">
                                    <li th:if="${pageNumberStat.first}" class="page-item">
                                        <a class="page-link"
                                           th:href="@{'/commande/allcommandes/'+${previous}+'/'+${selectedPageSize}}"
                                           aria-label="Previous">
                                            <span aria-hidden="true">&laquo;</span>
                                        </a>
                                    </li>
                                    <li class="page-item active" th:if="${pageNumber} == ${thisnumber}">
                                        <a class="page-link" th:text="${pageNumber}" href="#"></a>
                                    </li>
                                    <li class="page-item disabled" th:if="${pageNumber} == -1">
                                        <a class="page-link" href="#">...</a>
                                    </li>
                                    <li class="page-item"
                                        th:if="${pageNumber} != -1 and ${pageNumber} != ${thisnumber}">
                                        <a class="page-link" th:text="${pageNumber}"
                                           th:href="@{'/commande/allcommandes/'+${pageNumber}+'/'+${selectedPageSize}}"></a>
                                    </li>
                                    <li th:if="${pageNumberStat.last}"
                                        class="page-item"
                                        aria-label="Next">
                                        <a class="page-link" th:href="@{'/commande/allcommandes/'+${next}+'/'+${selectedPageSize}}">
                                            <span aria-hidden="true">&raquo;</span>
                                        </a>
                                    </li>
                                </th:block>
                            </ul>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</section>
</body>
</html>
<script th:inline="javascript">
    $(document).ready(function () {
    $("#pageSizeSelect").change(function () {
        var pagesizeselected = $("#pageSizeSelect").val();
        window.location.replace("/commande/allcommandes/1/" + pagesizeselected);
    });
    });
</script>
