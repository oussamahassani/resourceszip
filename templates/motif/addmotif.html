<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Ajouter un motif</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Ajouter un type de motif de réclamation</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">Ajouter un type de motif de réclamation</div>
                        <div class="card-body">
                            <form class="form-sample" th:action="@{/parameters/createmotif}" method="POST"
                                  th:object="${motifrec}">
                                <!-- Nom du Motif -->
                                  <h5 class="text-primary mt-2 mb-3">Français (par défaut)</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Nom du Motif</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" placeholder="Nom du Motif"
                                                       name="nomMotif"  th:required="required"/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                 <hr>

                                <!-- 🇬🇧 English -->
                                <h5 class="text-primary mt-2 mb-3">English</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Pattern Name (EN)</label>
                                            <div class="col-sm-8">
												 <input type="text" class="form-control" placeholder="Category Type"
                                                       name="nomMotifen" th:required="required"/>
                                                
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <hr>

                                <!-- 🇸🇦 Arabic -->
                                <h5 class="text-primary mt-2 mb-3">العربية</h5>
                                <div class="row rtl">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">اسم النمط(AR)</label>
                                            <div class="col-sm-8">
												<input type="text" class="form-control" placeholder="نوع الفئة"
                                                       name="nomMotifar" th:required="required"/>
                                               
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
 								<div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Catégorie</label>
                                            <div class="col-sm-9">
												 <select class="form-control" name="category" id="category" th:required="required">
                                                    <option value="">Choisissez une catégorie</option>                                                
                                                    <option th:value="Client">Client</option>
                                                    <option th:value="Revendeur">Revendeur</option>
                                                    <option th:value="chefsecteur">Chef secteur</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Service Type (Dropdown) -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Type de Service</label>
                                            <div class="col-sm-9">
                                                <select class="form-control" name="servicetypeId" th:required="required">
                                                    <option value="" disabled selected>Choisir un type de service</option>
                                                    <option th:each="type : ${serviceTypes}" th:value="${type.servicetypeId}" 
                                                            th:text="${type.categorytype}">Service Type</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Designation -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Désignation</label>
                                            <div class="col-sm-9">
                                                <textarea class="form-control" placeholder="Designation du type de service"
                                                          rows="4" cols="50" name="designation"  th:required="required">
                                                </textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Error message if motif already exists -->
                                <div th:if="${existedName != null}" class="alert alert-danger" role="alert">
                                    <p>Le motif existe déjà : <span th:text="${existedName}"></span></p>
                                </div>

                                <!-- Buttons -->
                                <div class="card-footer" style="margin-top: 20px; text-align: center;">
                                    <button type="submit" class="btn btn-success" style="margin-right: 20px;">
                                        Sauvegarder
                                    </button>
                                    <button type="reset" class="btn btn-danger" style="margin-left: 20px;">
                                        Réinitialiser
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
