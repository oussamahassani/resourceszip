<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Modifier un type de service</title>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Modifier un type de service de réclamation</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">Modifier un type de service de réclamation</div>
                        <div class="card-body">
                            <form class="form-sample" th:action="@{/parameters/editservicetype/{id}(id=${servicetype.servicetypeId})}" 
                                  method="POST" th:object="${servicetype}">
                                <!-- Hidden ID Field (Optional) -->
                                <input type="hidden" th:field="*{servicetypeId}" />

                                <!-- Category Type -->
                                 <h5 class="text-primary mt-2 mb-3">Français (par défaut)</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Type de Catégorie</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" placeholder="Type de Catégorie"
                                                       name="categorytype" th:field="*{categorytype}" required />
                                            </div>
                                        </div>
                                    </div>
                                </div>
 <hr>

                                <!-- 🇬🇧 English -->
                                <h5 class="text-primary mt-2 mb-3">English</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Category Type (EN)</label>
                                            <div class="col-sm-8">
												 <input type="text" class="form-control" placeholder="Category Type"
                                                       name="categorytypeen" th:field="*{categorytypeen}" th:required="required"/>
                                                
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <hr>

                                <!-- 🇸🇦 Arabic -->
                                <h5 class="text-primary mt-2 mb-3">العربية</h5>
                                <div class="row rtl">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">نوع الفئة (AR)</label>
                                            <div class="col-sm-8">
												<input type="text" class="form-control" placeholder="نوع الفئة"
                                                       name="categorytypear" th:field="*{categorytypear}" th:required="required"/>
                                               
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <!-- Error message if category type already exists -->
                                <div th:if="${existedName != null}" class="alert alert-danger" role="alert">
                                    <p>Type de catégorie existe déjà: <span th:text="${existedName}"></span></p>
                                </div>

                                <!-- Designation -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Désignation</label>
                                            <div class="col-sm-9">
                                                <textarea class="form-control" placeholder="Désignation"
                                                          rows="4" cols="50" name="designation"
                                                          th:field="*{designation}" required></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="custom-control custom-switch">
								    <input type="checkbox"
								           class="custom-control-input"
								           id="isPrivate"
								           th:field="*{isPrivate}" />
								
								    <label class="custom-control-label" for="isPrivate">
								        Private
								    </label>
								</div>

                                <!-- Buttons -->
                                <div class="card-footer" style="margin-top: 20px; text-align: center;">
                                    <button type="submit" class="btn btn-success" style="margin-right: 20px;">
                                        Sauvegarder
                                    </button>
                                    <a href="/parameters/allservicetypes/1/20" class="btn btn-danger" style="margin-left: 20px;">
                                        Annuler
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
