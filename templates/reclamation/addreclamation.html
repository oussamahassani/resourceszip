<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
    <title>Ajouter une réclamation</title>
    <style>
        .client-info-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-non-connecte {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status-connecte {
    background-color: #28a745; /* green */
    color: #fff;
}
        .status-non-paye {
            background-color: #fff3cd;
            color: #856404;
        }
        .client-search-row {
            display: none;
            margin-top: 10px;
        }
        .form-group.row {
            margin-bottom: 20px;
        }
        .custom-file-label::after {
            content: "Browse";
        }
        .search-options {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <section class="content">
        <div class="container-fluid">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Ajouter une réclamation</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 grid-margin">
                    <div class="card shadow mb-4">
                        <div class="card-body">
                            <form class="form-sample" th:action="@{/reclamations/addreclamation}" method="POST" enctype="multipart/form-data"
                                  th:object="${reclamation}">
                                
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Catégorie</label>
                                            <div class="col-sm-9">
                                                <div th:if="${isAdmin}">
                                                    <select id="category" name="category" data-control="select2" class="form-control js-select2"
                                                            data-placeholder="Choisissez une catégorie" th:required="required">
                                                        <option value="">Choisissez une catégorie</option>
                                                        <option value="Client">Client</option>
                                                        <option value="Revendeur">Revendeur</option>
                                                        <option value="chefsecteur">Chef secteur</option>
                                                    </select>
                                                </div>
                                                
                                                <div th:if="${isRevendeur}">
                                                    <select id="category" name="category" data-control="select2" class="form-control js-select2"
                                                            data-placeholder="Choisissez une catégorie" th:required="required">
                                                        <option value="">Choisissez une catégorie</option>
                                                        <option value="Client">Client</option>
                                                        <option value="Revendeur">Revendeur</option>
                                                    </select>
                                                </div>
                                                
                                                <div th:if="${isDistributeur}">
                                                    <select id="category" name="category" data-control="select2" class="form-control js-select2"
                                                            data-placeholder="Choisissez une catégorie" th:required="required">
                                                        <option value="">Choisissez une catégorie</option>
                                                        <option value="Revendeur">Revendeur</option>
                                                        <option value="chefsecteur">Chef secteur</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div id="clientSearchRow" class="client-search-row">
                                            <div class="form-group row">
                                                <label class="col-sm-3 col-form-label">Rechercher par :</label>
                                                <div class="col-sm-9">
                                                    <div class="search-options">
                                                        <div class="d-flex align-items-center mr-3">
                                                            <div class="form-check form-check-inline mr-2">
                                                                <input class="form-check-input" type="radio" name="searchType" id="searchCIN" value="cin" checked>
                                                                <label class="form-check-label" for="searchCIN">CIN</label>
                                                            </div>
                                                            <div class="form-check form-check-inline">
                                                                <input class="form-check-input" type="radio" name="searchType" id="searchFixe" value="telFixe">
                                                                <label class="form-check-label" for="searchFixe">Numéro fixe</label>
                                                            </div>
                                                        </div>
                                                        <div class="search-input-group">
                                                            <input type="text" id="searchValue" class="form-control" 
                                                                   placeholder="Entrer la valeur de recherche" style="flex: 1;">
                                                            <button type="button" class="btn btn-primary" id="btnSearchClient">
                                                                Rechercher
                                                            </button>
                                                        </div>
                                                    </div>
                                                    
                                                    <div id="clientInfoDisplay" class="client-info-card">
                                                        <div class="row">
                                                            <div class="col-md-12">
                                                                <div class="d-flex justify-content-between align-items-center mb-2">
                                                                    <h6 class="mb-0" id="displayClientName">Arfaoui Rym</h6>
                                                                </div>
                                                                <div class="d-flex justify-content-between">
                                                                    <div>
                                                                        <span class="text-muted">État de connexion:</span>
                                                                        <span class="status-badge status-non-connecte ml-2">Non connecté</span>
                                                                    </div>
                                                                    <div>
                                                                        <span class="text-muted">Statut:</span>
                                                                        <span class="status-badge status-non-paye ml-2">Non payé</span>
                                                                    </div>
                                                                    <div>
                                                                        <a href="#" 
											   class="btn btn-outline-primary btn-sm">
											   Voir détails
											</a>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
								                                <div class="row" id="pourQuiRow">
								                                    <div class="col-md-6">
								                                        <div class="form-group row">
								                                            <label class="col-sm-3 col-form-label">Pour qui?</label>
								                                            <div class="col-sm-9">
								                                                <select name="clientId" id="clientId"
								                                                        data-control="select2"
								                                                        class="form-control js-select2"
								                                                        data-placeholder="Choisissez la personne réclamée">
								                                                    <option value="" disabled selected>Choisissez la personne réclamée</option>
								                                                </select>
								                                            </div>
								                                        </div>
								                                    </div>
								                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Type de réclamation</label>
                                            <div class="col-sm-9">
                                                <select name="servicetypeId" id="servicetypeId" 
                                                        data-control="select2"
                                                        class="form-control js-select2"
                                                        data-placeholder="Choisissez un type de service" th:required="required">
                                                    <option value="">Choisissez un type de service</option>
                                                    <option th:each="service : ${servicetypeList}"
                                                            th:value="${service.servicetypeId}" th:text="${service.categorytype}"></option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                               

                                <input type="hidden" name="source" value="CRM" />
                                
                                <!-- Motif -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Motif</label>
                                            <div class="col-sm-9">
                                                <select name="motifId" id="motifId" 
                                                        data-control="select2"
                                                        class="form-control js-select2"
                                                        data-placeholder="Choisissez un motif" th:required="required">
                                                    <option value="" disabled selected>Choisissez un motif</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Autre Motif -->
                                <div class="row" id="autreMotifRow" style="display:none;">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Autre</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="autre" 
                                                       placeholder="Placez votre motif">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Description -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Description</label>
                                            <div class="col-sm-9">
                                                <textarea class="form-control" name="description" rows="4" 
                                                          placeholder="Description de la réclamation" th:required="required"></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group row">
                                            <label class="col-sm-3 col-form-label">Pièces justificatives</label>
                                            <div class="col-sm-9">
                                                <div class="custom-file">
                                                    <input type="file"
                                                           accept=".jpg, .jpeg, .JPG, .JPEG, .png, .PNG, .pdf, .PDF"
                                                           class="custom-file-input"
                                                           id="imageFile2"
                                                           name="justificatif"
                                                           multiple />
                                                    <label class="custom-file-label" for="imageFile2">
                                                        Choisir une image
                                                    </label>
                                                </div>
                                                <img src="/img/faces/choisiruneimage.png" id="prev2" class="bloc_imgUpload mt-2" style="max-width: 100px; display: none;" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
 
                                
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group row">
                                            <div class="col-sm-3"></div>
                                            <div class="col-sm-9">
                                                <button type="submit" class="btn btn-success mr-3">
                                                    Sauvegarder
                                                </button>
                                                <button type="button" id="reinitialiserButton" class="btn btn-danger">
                                                    Réinitialiser
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <input type="hidden" name="message" id="message" th:value="${message != null ? message : ''}" />
    </section>
</section>

</body>
</html>

<script>
$(document).ready(function () {
    // Initialize Select2
    $('.js-select2').select2({ allowClear: true });
    
    // Handle "Autre" motif selection
    $('#motifId').on('change', function () {
        var selectedText = $("#motifId option:selected").text();
        if (selectedText === 'Autre') {
            $('#autreMotifRow').show();
        } else {
            $('#autreMotifRow').hide();
        }
    });
    
    $('#category').on('change', function() {
        var category = $(this).val();
        if (category === 'Client') {
            $('#clientSearchRow').show();
            $('#pourQuiRow').hide();
            $('#clientInfoDisplay').hide();
            $('#searchValue').val('');
            $('#selectedClientId').val('');
        } else if (category === 'Revendeur' || category === 'chefsecteur') {
            $('#clientSearchRow').hide();
            $('#pourQuiRow').show();
            $('#clientInfoDisplay').hide();
            loadClientsByCategory(category);
        } else {
            $('#clientSearchRow').hide();
            $('#pourQuiRow').hide();
            $('#clientInfoDisplay').hide();
        }
    });
    
    $('#servicetypeId, #category').on('change', function () {
        var serviceTypeId = $('#servicetypeId').val();
        var category = $('#category').val();
        
        if (serviceTypeId && category) {
            loadMotifsByServiceType(serviceTypeId, category);
        }
    });
    
    $('#btnSearchClient').on('click', function () {
        const searchType = $('input[name="searchType"]:checked').val();
        const value = $('#searchValue').val();
        
        if (!value) {
            alert("Veuillez entrer une valeur");
            return;
        }
        
        if (searchType === 'telFixe' && isNaN(value)) {
            alert("Le numéro de téléphone fixe doit être numérique");
            return;
        }
        
        $('#clientInfoDisplay').html(
            '<div class="text-center p-3">' +
            '<div class="spinner-border spinner-border-sm text-primary" role="status"></div>' +
            '<span class="ml-2">Recherche en cours...</span>' +
            '</div>'
        ).show();
        
        $('#btnSearchClient').prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Recherche...');
        
        $.ajax({
            url: '/reclamations/search-client',
            method: 'GET',
            data: {
                type: searchType,
                value: value
            },
            success: function (response) {
                $('#btnSearchClient').prop('disabled', false).html('Rechercher');
                
                if (!response) {
                    $('#clientInfoDisplay').html(
                        '<div class="alert alert-warning">' +
                        '<i class="fas fa-exclamation-triangle mr-2"></i>' +
                        'Aucune réponse du serveur' +
                        '</div>'
                    ).show();
                    $('#selectedClientId').val('');
                    return;
                }
                
                if (response.clientId) {
                    $('#selectedClientId').val(response.clientId);
                    
                    let clientInfoHtml = '';
                    
                    if (response.success === false) {
						let warningMessage = response.message || 'Ce client a une réclamation en cours';
							
							if (response.reclamationid && response.reclamationRef) {
							    warningMessage += `
							        <br>
							        <a href="/reclamations/getReclamation/${response.reclamationid}"
							           target="_blank"
							           class="font-weight-bold text-primary">
							            (Réclamation ref: ${response.reclamationRef})
							        </a>
							    `;
							}
                        clientInfoHtml = `
                            <div class="alert alert-warning mb-2">
                                <i class="fas fa-exclamation-triangle mr-2"></i>
                                ${warningMessage}
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0">${response.lastName} ${response.firstName}</h6>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <span class="text-muted">CIN:</span>
                                            <span class="ml-2 font-weight-bold">${response.cin}</span>
                                        </div>
                                        <div>
                                            <span class="text-muted">Tél:</span>
                                            <span class="ml-2 font-weight-bold">${response.telFixe}</span>
                                        </div>
                                        <div>
                                            <a href="/client/viewclient/${response.clientId}" target="_blank"
											   class="btn btn-outline-primary btn-sm">
											   Voir détails
											</a>
                                        </div>
                                    </div>
                                    <div class="mt-2 d-flex justify-content-between">
                                        <div>
                                             <span class="text-muted">État de connexion:</span>
									        <span class="status-badge ${response.etatConnection === 'connecté' ? 'status-connecte' : 'status-non-connecte'} ml-2">
									            ${response.etatConnection}
									        </span>
                                        </div>
                                        <div>
                                            <span class="text-muted">Statut:</span>
                                            <span class="status-badge status-non-paye ml-2">${response.statut || 'Non payé'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" name="clientId" value="${response.clientId}" id="selectedClientId">
                        `;
                        
                        $(document).Toasts("create", {
                            title: "Attention",
                            body: response.message || "Ce client a une réclamation en cours",
                            class: "bg-warning",
                            autohide: true,
                            delay: 10000,
                        });
                    } else {
                        clientInfoHtml = `
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="mb-0">${response.lastName} ${response.firstName}</h6>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <span class="text-muted">CIN:</span>
                                            <span class="ml-2 font-weight-bold">${response.cin}</span>
                                        </div>
                                        <div>
                                            <span class="text-muted">Tél:</span>
                                            <span class="ml-2 font-weight-bold">${response.telFixe}</span>
                                        </div>
                                        <div>
                                            <a href="/client/viewclient/${response.clientId}" target="_blank"
											   class="btn btn-outline-primary btn-sm">
											   Voir détails
											</a>
                                        </div>
                                    </div>
                                    <div class="mt-2 d-flex justify-content-between">
                                        <div>
                                             <span class="text-muted">État de connexion:</span>
									        <span class="status-badge ${response.etatConnection === 'connecté' ? 'status-connecte' : 'status-non-connecte'} ml-2">
									            ${response.etatConnection}
									        </span>
                                        </div>
                                        <div>
                                            <span class="text-muted">Statut:</span>
                                            <span class="status-badge status-non-paye ml-2">${response.statut || 'Non payé'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" name="clientId" value="${response.clientId}" id="selectedClientId">
                        `;
                    }
                    
                    $('#clientInfoDisplay').html(clientInfoHtml).show();
                    
                } else {
                    $('#clientInfoDisplay').html(
                        '<div class="alert alert-warning">' +
                        '<i class="fas fa-exclamation-triangle mr-2"></i>' +
                        (response.message ? response.message : 'Aucun client trouvé avec ces critères') +
                        '</div>'
                    ).show();
                    $('#selectedClientId').val('');
                }
            },
            error: function (xhr, status, error) {
                $('#btnSearchClient').prop('disabled', false).html('Rechercher');
                
                console.error('AJAX Error Details:', {
                    status: xhr.status,
                    statusText: xhr.statusText,
                    responseText: xhr.responseText,
                    error: error
                });
                
                let errorMessage = "Erreur lors de la recherche";
                
                if (xhr.responseJSON && xhr.responseJSON.message) {
                    errorMessage = xhr.responseJSON.message;
                } else if (xhr.status === 404) {
                    errorMessage = "Endpoint non trouvé. Vérifiez le chemin de l'API.";
                } else if (xhr.status === 500) {
                    errorMessage = "Erreur serveur interne. Vérifiez les logs.";
                }
                
                $('#clientInfoDisplay').html(
                    '<div class="alert alert-danger">' +
                    '<i class="fas fa-exclamation-circle mr-2"></i>' +
                    errorMessage +
                    '</div>'
                ).show();
                $('#selectedClientId').val('');
            }
        });
    });

    $('#searchValue').on('keypress', function(e) {
        if (e.which === 13) { // Enter key
            e.preventDefault();
            $('#btnSearchClient').click();
        }
    });
  /*  
    $('#imageFile2').on('change', function() {
        var fileName = $(this).val().split('\\').pop();
        $(this).next('.custom-file-label').text(fileName);
        
        if (this.files && this.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#prev2').attr('src', e.target.result).show();
            }
            reader.readAsDataURL(this.files[0]);
        }
    });*/
    $('#imageFile2').on('change', function() {
    var files = this.files;
    var previewContainer = $('#prev2');
    previewContainer.empty(); // Clear previous previews
    var fileNames = [];

    for (var i = 0; i < files.length; i++) {
        fileNames.push(files[i].name);

        // If you want to show a preview for images
        if (files[i].type.startsWith('image/')) {
            var reader = new FileReader();
            reader.onload = (function(file) {
                return function(e) {
                    previewContainer.append(
                        `<img src="${e.target.result}" class="bloc_imgUpload mt-2" style="max-width: 100px; margin-right:5px;" />`
                    );
                };
            })(files[i]);
            reader.readAsDataURL(files[i]);
        }
    }

    previewContainer.append(`<div class="mt-2"><strong>Fichiers:</strong> ${fileNames.join(', ')}</div>`);
});

});

function loadMotifsByServiceType(serviceTypeId, category) {
    $.ajax({
        url: '/reclamations/motifs/' + serviceTypeId + '/' + category,
        method: 'GET',
        success: function (data) {
            var motifSelect = $('#motifId');
            motifSelect.empty();
            motifSelect.append('<option value="" disabled selected>Choisissez un motif</option>');
            
            data.forEach(function (motif) {
                motifSelect.append('<option value="' + motif.motifId + '">' + motif.nomMotif + '</option>');
            });
        },
        error: function (error) {
            console.log('Error loading motifs: ', error);
        }
    });
}

function loadClientsByCategory(category) {
    $.ajax({
        url: '/reclamations/clients/' + category,
        method: 'GET',
        success: function(data) {
            var clientSelect = $('#clientId');
            clientSelect.empty();
            clientSelect.append('<option value="" disabled selected>Choisissez la personne réclamée</option>');
            
            data.forEach(function(client) {
                clientSelect.append('<option value="' + client.clientId + '">' + 
                    client.lastName + ' ' + client.firstName + ' (' + client.codeUser + ')' + 
                    '</option>');
            });
        },
        error: function(error) {
            console.error('Error loading clients: ', error);
        }
    });
}

var messagenotif = document.getElementById("message").value;
if (messagenotif !== "" && messagenotif == "Une réclamation a été ajouté avec succées") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Une réclamation a été ajouté avec succées",
        class: "bg-success",
        autohide: true,
        delay: 10000,
    });
}
if (messagenotif !== "" && messagenotif == "Vous avez une autre réclamation encours.") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Vous avez une autre réclamation encours.",
        class: "bg-danger",
        autohide: true,
        delay: 10000,
    });
}
if (messagenotif !== "" && messagenotif == "Des parametres sont manquants") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Des paramètres sont manquants",
        class: "bg-danger",
        autohide: true,
        delay: 10000,
    });
}
$('#reinitialiserButton').on('click', function(e) {
    e.preventDefault(); 

    $('form')[0].reset();

    $('.js-select2').val(null).trigger('change');

    $('#clientSearchRow').hide();
    $('#pourQuiRow').hide();
    $('#clientInfoDisplay').hide();
    $('#autreMotifRow').hide();

    $('#searchValue').val('');
    $('#selectedClientId').val('');

    $('#prev2').empty().hide();


});
</script>
