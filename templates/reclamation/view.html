<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
	layout:decorator="layout">

<head>

	<title>Detail réclamation</title>
	<link rel="stylesheet" th:href="@{/css/customvariablestyle.css}" />
	<style>
		.select2-container .select2-search--dropdown .select2-search__field {
			border: 1px solid #ccc;
			border-radius: 5px;
			padding: 5px;
		}

		.select2-container {
			position: relative;
		}

		.select2-dropdown {
			position: absolute;
			z-index: 1061;
		}
	</style>


</head>

<body>
	<section layout:fragment="content">
		<section class="content">
			<div class="container-fluid">
				<!-- Content Header (Page header) -->
				<div class="content-header">
					<div class="container-fluid">
						<div class="row mb-2">
							<div class="col-sm-12">
								<h1 class="m-0">Fiche d’information réclamation</h1>
							</div>
						</div>
					</div>
				</div>

				<div class="row">
					<div class="col-12 grid-margin"></div>
					<div class="col-12">
						<div class="card card-primary card-outline card-outline-tabs">
							<div class="card-header p-0 border-bottom-0">
								<ul class="nav nav-tabs" id="custom-tabs-four-tab" role="tablist">
									<li class="nav-item"><a class="nav-link active" id="custom-tabs-info-tab"
											data-toggle="pill" href="#custom-tabs-info" role="tab"
											aria-controls="custom-tabs-info" aria-selected="true">Information</a>
									</li>								
									<li class="nav-item" sec:authorize="hasAnyAuthority('READ_HISTORIQUE_CLIENT')"><a
											class="nav-link" id="historique-tabs-action-tab" data-toggle="pill"
											href="#historique-tabs-action" role="tab"
											aria-controls="historique-tabs-action" aria-selected="false">Historique </a>
									</li>
								
								</ul>
							</div>
							<div class="card-body">
								<div class="tab-content" id="custom-tabs-four-tabContent">

									<div class="tab-pane fade active show" id="custom-tabs-info" role="tabpanel"
										aria-labelledby="custom-tabs-info-tab">
										<div class="row">
										
									<button type="button" class="btn btn-info" data-toggle="modal" data-target="#interventionModal" sec:authorize="hasAnyAuthority('CREATE_INTERVENTION')"
									   th:if="${!(reclamation.category == 'Client'
                and reclamation.serviceType != null
                and reclamation.serviceType.categorytype == 'Technique')}">
							 		 <i class="fa fa-plus-circle"></i> Créer une intervention
										</button>

							
							<!-- Modal -->
							<div class="modal fade" id="interventionModal" tabindex="-1" aria-labelledby="interventionModal" aria-hidden="true">
							  <div class="modal-dialog">
							    <div class="modal-content">
							      <!-- Modal Header -->
							      <div class="modal-header">
							        <h5 class="modal-title" id="interventionModalLabel">Crée une intervention</h5>
							        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
							      </div>
							      <!-- Modal Body -->
							      <div class="modal-body">
							        <!-- Intervention Form -->
							       <form sec:authorize="hasAnyAuthority('CREATE_INTERVENTION')"
						              th:action="@{/reclamations/addIntervention}" method="POST">
						          <!-- Reclamation ID -->
						          <input type="hidden" name="reclamationid" th:value="${reclamation.reclamationid}" />
						
						          <!-- Status -->
						          <!-- Dynamic Status Dropdown using nomStatut -->
									<div class="mb-3">
									  <label for="status" class="form-label">Statut</label>
									  <select class="form-select" id="status" name="status" required>
									    <option value="">-- Choisir un statut --</option>
									    <option th:each="status : ${statusList}"
									            th:value="${status.nomStatut}"
									            th:text="${status.designation}">
									    </option>
									  </select>
									</div>						
						          <!-- Description -->
						          <div class="mb-3">
						            <label for="description" class="form-label">Description</label>
						            <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
						          </div>
						
									          <!-- Submit Button -->
									          <div class="modal-footer">
									            <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
									            <button type="submit" class="btn btn-primary">Créer</button>
									          </div>
									        </form>
										      </div>
										    </div>
										  </div>
										</div>
										<!--end modal for créer une intervention -->
										<!-- add technician intervention -->
										<button type="button" class="btn btn-warning ml-2" data-toggle="modal" data-target="#interventionModalTech" sec:authorize="hasAnyAuthority('CREATE_INTERVENTION_AGENT')"
									   th:if="${canSeeMycomplaints != null and canSeeMycomplaints  }">
							 		 <i class="fa fa-plus-circle"></i> Intervention technicien
										</button>

							
							<!-- Modal -->
							<div class="modal fade" id="interventionModalTech" tabindex="-1" aria-labelledby="interventionModalTech" aria-hidden="true">
							  <div class="modal-dialog">
							    <div class="modal-content">
							      <!-- Modal Header -->
							      <div class="modal-header">
							        <h5 class="modal-title" id="interventionModalLabel">Crée une intervention</h5>
							        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
							      </div>
							      <!-- Modal Body -->
							      <div class="modal-body">
							        <!-- Intervention Form -->
							       <form sec:authorize="hasAnyAuthority('CREATE_INTERVENTION_AGENT')"
						              th:action="@{/reclamations/addInterventionTech}" method="POST">
						          <!-- Reclamation ID -->
						          <input type="hidden" name="reclamationid" th:value="${reclamation.reclamationid}" />
						
						          <!-- Status -->
						          <!-- Dynamic Status Dropdown using nomStatut -->
									<div class="mb-3">
									  <label for="status" class="form-label">Statut</label>
									  <select class="form-select" id="status" name="status" required>
									    <option value="">-- Choisir un statut --</option>
									    <option value="Affectée">Affectée</option>
									    <option value="Prise en charge">Prise en charge</option>
									    <option value="En attente client">En attente client</option>
									    <option value="En attente matériel">En attente matériel</option>
									    <option value="Diagnostic en cours">Diagnostic en cours</option>
									    <option value="Adresse incorrecte">Adresse incorrecte</option>
									    <option value="Panne externe">Panne externe</option>
									    <option value="Hors périmètre">Hors périmètre</option>
									    <option value="Résolue">Résolue</option>
									    <option value="Replanifié">Replanifié</option>
									    
									  </select>
									</div>						
						          <!-- Description -->
						          <div class="mb-3">
						            <label for="description" class="form-label">Description</label>
						            <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
						          </div>
						
									          <!-- Submit Button -->
									          <div class="modal-footer">
									            <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
									            <button type="submit" class="btn btn-primary">Créer</button>
									          </div>
									        </form>
										      </div>
										    </div>
										  </div>
										</div>
																												
							<button th:if="${reclamation.client} != null and ${reclamation.serviceType.categorytype} == 'Technique' "
							        type="button" class="btn btn-primary ml-2"
							        data-toggle="modal" data-target="#referencettModal"
							        sec:authorize="hasAnyAuthority('CREATE_REFERENCE_TT')">
							  <i class="fa fa-plus-circle"></i>
							  <span th:text="${reclamation.referencett != null and !#strings.isEmpty(reclamation.referencett) ? 'Modification des informations TT' : 'Ajouter des informations TT'}"></span>
							</button>

								<!-- Modal -->
							<div class="modal fade" id="referencettModal" tabindex="-1" aria-labelledby="referencettModal" aria-hidden="true">
							  <div class="modal-dialog">
							    <div class="modal-content">
							      <!-- Modal Header -->
							      <div class="modal-header">
							       <h5 class="modal-title" id="interventionModalLabel"
								    th:text="${reclamation.referencett != null and !#strings.isEmpty(reclamation.referencett) ? 'Modification des informations TT' : 'Ajouter des informations TT'}">
								    Ajouter des informations TT
								</h5>

							        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
							      </div>
							      <!-- Modal Body -->
							      <div class="modal-body">
							        <!-- Intervention Form -->
							       <form sec:authorize="hasAnyAuthority('CREATE_REFERENCE_TT')"
						              th:action="@{/reclamations/addreferencett}" method="POST">
						          <!-- Reclamation ID -->
						          <input type="hidden" name="reclamationid" th:value="${reclamation.reclamationid}" />
						          <input type="hidden" name="state" th:value="${reclamation.referencett != null and !#strings.isEmpty(reclamation.referencett) ? 'old' : 'new'}" />
						          <div class="mb-3">
						            <label for="description" class="form-label">Référence TT</label>
						            <input class="form-control" id="referencett" name="referencett" rows="3" required
						           th:value="${reclamation.referencett != null ? reclamation.referencett : ''}" />
						          </div>
						            <div class="mb-3">
						            <label for="description" class="form-label">Etat TT</label>
						            <select class="form-select" id="etattt" name="etattt" required>
									    <option value="">-- Choisir un etat tt --</option>
									    <option th:each="status : ${statusList}"
									            th:value="${status.nomStatut}"
									            th:text="${status.designation}"
									             th:selected="${reclamation.etattt != null and status.nomStatut == reclamation.etattt}" >
									    </option>
									  </select>
						           <!-- <input class="form-control" id="etattt" name="etattt" rows="3" required
						           th:value="${reclamation.etattt != null ? reclamation.etattt : ''}" />-->
						          </div>
						          <div class="mb-3">
								  <label for="date_reclamationtt" class="form-label">Date Réclamation TT</label>
								  <input type="date" class="form-control" id="date_reclamationtt" name="date_reclamationtt" required
								         th:value="${reclamation.date_reclamationtt != null ? #dates.format(reclamation.date_reclamationtt, 'yyyy-MM-dd') : ''}" />
								</div>
								
								<div class="mb-3">
								  <label for="date_etattt" class="form-label">Date État TT</label>
								  <input type="date" class="form-control" id="date_etattt" name="date_etattt" required
								         th:value="${reclamation.date_etattt != null ? #dates.format(reclamation.date_etattt, 'yyyy-MM-dd') : ''}" />
								</div>
								
								<div class="mb-3">
								  <label for="date_verificationfsi" class="form-label">Date Vérification FSI</label>
								  <input type="date" class="form-control" id="date_verificationfsi" name="date_verificationfsi"
								         th:value="${reclamation.date_verificationfsi != null ? #dates.format(reclamation.date_verificationfsi, 'yyyy-MM-dd') : ''}" />
								</div>

						
									          <!-- Submit Button -->
									          <div class="modal-footer">
									            <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
									            <button type="submit" class="btn btn-primary">Crée</button>
									          </div>
									        </form>
										      </div>
										    </div>
										  </div>
										</div>
										<!--end modal for créer une intervention -->
										</div>

										<form id="myForm" class="form-sample" >
											
											<div class="row" >
												
												<div class="col-sm-6" >
													<!--user -->

												                        <img th:case="null" class="img-circle elevation-2" th:src="@{/img/user2-160x160.jpg}"

												                        <img th:case="*" class="img-circle elevation-2" th:src="@{${'/photos/'+user.email+'/'+user.photo}}"
												                             alt="Profile image" width="200px">
												                    </div>
												
												                </div>
																<div class="row">

																	<div class="col-sm-8" th:text="${user.firstName}"></div>
																
																
																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">Prénom:</label>
																		<div class="col-sm-8" th:text="${user.lastName}"></div>
																	
																</div>

																<div class="row">
																	<label class="col-sm-4 col-form-label">Email:</label>
																	<div class="col-sm-8" th:text="${user.email}"></div>
																	
																</div>

															<div class="row">
																	<label class="col-sm-4 col-form-label">Forme juridique:</label>
																	<div class="col-sm-8" th:text="${user.formeJuridique}"></div>
																	
																</div>
	                                                             <div class="row">
																	<label class="col-sm-4 col-form-label">Identification fiscale:</label>
																	<div class="col-sm-8" th:text="${user.identificationFiscale}"></div>
																	
																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">Class user :</label>
																	<div class="col-sm-8" th:text="${user.classUser}"></div>
																	
																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">plafon  :</label>
																	<div class="col-sm-8" th:text="${user.plafonRevendeur}"></div>
																	
																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">coordonnees Bancaires  :</label>
																	<div class="col-sm-8" th:text="${user.coordonneesBancaires}"></div>
																	
																</div>
																	<div class="row">
																	<label class="col-sm-4 col-form-label">typeuser  :</label>
																	<div class="col-sm-8" th:text="${user.typeUser}"></div>
																	
																</div>
																	<div class="row">
																	<label class="col-sm-4 col-form-label">Role  :</label>
																	<div class="col-sm-8" th:text="${user.role.roleName}"></div>
																	
																</div>
																		<div class="row">
																	<label class="col-sm-4 col-form-label">Activite Principale  :</label>
																	<div class="col-sm-8" th:text="${user.ActivitePrincipale}"></div>
																	
																</div>
																
																<div class="row"  th:if="${user.gouvernorat != null}">
																	<label class="col-sm-4 col-form-label">Gouvernorat:</label>
																	<div class="col-sm-8"
																		th:text="${user.gouvernorat.gouvernoratName}"></div>																	
																</div>																
																<div class="row" th:if="${user.ville != null}">
																	<label class="col-sm-4 col-form-label">Ville:</label>
																	<div class="col-sm-8"
																		th:text="${user.ville.villeName}"></div>																	
																</div>
																
																<div class="row">
																	<label class="col-sm-4 col-form-label">Adresse:</label>

																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">Code

																	<div class="col-sm-8" th:text="${postalCode}"></div>																	
																</div>																																
																<div class="row">
																	<label class="col-sm-4 col-form-label">stock
																		:</label>
																	
																	<div th:switch="${user.withStock}"> 
																	  <p th:case="'true'">Avec Stock</p>

																	</div>

																<div class="row">

																</div>

																				</div>

															</div>
														</div>
													</div>
													<!-- abonnement -->
													<div class="card-block" th:if="${abonnement != null}">

															<h4>Informations principales</h4>

															<input type="hidden" name="demandeid" th:field="${abonnement.clientid}" />

																<div class="row">

																	</div>

<script th:inline="javascript">
	var canSeeMycomplaints = document.getElementById("canSeeMycomplaints").value;

	var messagenotif = document.getElementById("message").value;
if (messagenotif !== "" && messagenotif == "comentaireAjouter") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Un commentaire a été ajouté",
        class: "bg-success",
        autohide: true,
        delay: 10000,
    });
}

// --- Intervention ajoutée ---
if (messagenotif !== "" && messagenotif == "interventionAjouter") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Une intervention a été ajoutée",
        class: "bg-success",
        autohide: true,
        delay: 10000,
    });
}

// --- Référence TT ajoutée avec succès ---
if (messagenotif !== "" && messagenotif == "referencettAjouter") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Les paramètres TT a été ajoutée avec succès.",
        class: "bg-success",
        autohide: true,
        delay: 10000,
    });
}
// --- Référence TT modifié avec succès ---
if (messagenotif !== "" && messagenotif == "referencettModifier") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Les paramètres TT a été modifié avec succès.",
        class: "bg-success",
        autohide: true,
        delay: 10000,
    });
}

// --- Erreur de paramètres manquants ---
if (messagenotif !== "" && messagenotif == "paramaterManquante") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Une erreur est survenue !",
        class: "bg-danger",
        autohide: true,
        delay: 10000,
    });
}

// --- Référence TT déjà existante (nouvelle insertion) ---
if (messagenotif !== "" && messagenotif == "referencettExistDeja") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Cette référence TT existe déjà dans le système !",
        class: "bg-warning",
        autohide: true,
        delay: 10000,
    });
}

// --- Référence TT modifiée vers une existante ---
if (messagenotif !== "" && messagenotif == "referenceModifierExiste") {
    $(document).Toasts("create", {
        title: "Réclamation",
        body: "Impossible de modifier : la nouvelle référence TT existe déjà !",
        class: "bg-warning",
        autohide: true,
        delay: 10000,
    });
}
		// Au clic de l'image , Pour afficher l'image dans une popup bootstrap
	$("#prev").click(function () {
		// Récupération de l'URL de l'image
		var imgSrc = $(this).attr('src');
		// Affichage de la popup
		$('#imgModal').attr('src', imgSrc);
		$('#myModal').modal('show');
	});

	$("#prev2").click(function () {
		// Récupération de l'URL de l'image
		var imgSrc = $(this).attr('src');
		// Affichage de la popup
		$('#imgModal').attr('src', imgSrc);
		$('#myModal').modal('show');
	});

</script>
