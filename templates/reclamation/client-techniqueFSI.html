 case "identifiant" : {

    statusTech = event.target.value;

}

  drawCallback: function () {

  $('input[name="chekelement"]').each(function () {
    let id = parseInt(this.id);
    this.checked = listedes_ids_reclamations.includes(id);

    listedes_ids_reclamations.length > 0 &&

    columnDefs: [
      {

document.getElementById('countReclamationSelected').innerHTML = listedes_ids_reclamations.length;

    let exportBtn = $("#exportReclamations");

        assignBtn.length && assignBtn.prop('disabled', false);
        exportBtn.length && exportBtn.prop('disabled', false);
    } else {
        assignBtn.length && assignBtn.prop('disabled', true);
        exportBtn.length && exportBtn.prop('disabled', true);
    }

    const countSpan = document.getElementById('countReclamationSelected');
    if (countSpan) {
