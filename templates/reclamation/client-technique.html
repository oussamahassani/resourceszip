<script  th:inline="javascript">
var oTable;
var hasediterole = document.getElementById("hasediterole").value;
let  Reference = "";
let Status = "";
let datedebut = "";
let datefin = "";
let dateDebutModification = "";
let dateFinModification ="";
let AffecterTo = "";
let Creepar = "" ;
let telFixe="";
let motifRec="";
let referencett="";
let referencenety="";
let identifiant="";
let source="";
let agentsav="";
let etattt="";
let datereclamationttdebut="";
let datereclamationttfin="";
let dateverificationfsidebut="";
let dateverificationfsifin="";
let centralrelclamtion="";
let gouvernorat = "";
let statusTech = "";
var messagenotif = document.getElementById("message").value ;
    if (messagenotif !== "" && messagenotif == "clientupdated") {
     	$(document).Toasts('create', {
  		  title: "La modification a été effectuée avec succès",
  		  body: "",
  		  class: 'bg-success',
  		  autohide:true,
  		  delay: 10000
  		})
    }
$("#togglebutton").click(function () {

    $("#showMe3").toggle();
  });
  
function onchangeSearch(event) {
    let name = event.target.name;
    switch (name) {
      case "ref_reclamation": {
    	  Reference = event.target.value;
        break;
      }
        case "telFixe": {
    	  telFixe = event.target.value;
        break;
      }

      case "Status": {
    	  Status = event.target.value;
        break;
        
      }
      case "etattt": {
    	  etattt = event.target.value;
        break;
        
      }
 
      case "datefin": {
    	  datefin = event.target.value;
          break;
        }
        case "datedebut": {
        	datedebut = event.target.value;
        break;
      }
        case "dateDebutModification": {
        	dateDebutModification = event.target.value;
        break;
      }
        case "dateFinModification": {
        	dateFinModification = event.target.value;
        break;
      }
        case "AffecterTo" : {
        	AffecterTo = event.target.value ; 
        	break;
        }
         case "agentsav" : {
        	agentsav = event.target.value ; 
        	break;
        }
        case "Creepar" : {
        	Creepar = event.target.value ;
        	break ; 
        }
 case "identifiant" : {
        	identifiant = event.target.value
        	break;
        }
        case "referencett" : {
        	referencett = event.target.value
        	break;
        }
        case "referencenety" : {
        	referencenety = event.target.value
        	break;
        }
        case "listeClientFilter" : {
        	listeClientFilter= event.target.value
        
    	break ; 
        }
        case "motifrelclamtion" : {
        	motifRec = event.target.value
        	break ; 
        }
          case "source" : {
        	source = event.target.value
        	break ; 
        }
         case "datereclamationttdebut" : {
        	datereclamationttdebut = event.target.value
        	break ; 
        }
         case "datereclamationttfin" : {
        	datereclamationttfin = event.target.value
        	break ; 
        }
         case "dateverificationfsidebut" : {
        	dateverificationfsidebut = event.target.value
        	break ; 
        }
         case "dateverificationfsifin" : {
        	dateverificationfsifin = event.target.value
        	break ; 
        }
          case "centralrelclamtion" : {
        	centralrelclamtion = event.target.value
        	break ; 
        }
        case "gouvernorat": {
    gouvernorat = event.target.value;
    break;
}
   case "statusTech": {
    statusTech = event.target.value;
    break;
}
        
    }}
    
function onclicksherh(event) {    
    event.preventDefault();
      changeRecherche = true;
    $("#tutorialTable")
      .DataTable()
      .column(0)
      .search(
        JSON.stringify({
        	reference:Reference ,       
        	Status : Status,	
        	telFixe:telFixe,	
			 datefin:datefin,
	          datedebut:datedebut,
	          dateDebutModification:dateDebutModification,
	          dateFinModification:dateFinModification,
	          AffecterTo:AffecterTo , 
	          Creepar : Creepar,
	           identifiant:identifiant,
	          referencett:referencett,
	          referencenety:referencenety,
	          motifRec:motifRec,
	          source:source, agentsav:agentsav, etattt:etattt,
	          datereclamationttdebut:datereclamationttdebut,
	          datereclamationttfin:datereclamationttfin,
	          dateverificationfsidebut:dateverificationfsidebut,
				dateverificationfsifin:dateverificationfsifin,
				centralrelclamtion:centralrelclamtion,gouvernorat: gouvernorat,statusTech:statusTech
        })
      )
      .draw();
          document.getElementById("select_all").checked = false;
    changeRecherche = false;
  } 
oTable = $("#tutorialTable").DataTable({
    processing: true,
    serverSide: true,
    ordering: true,
    order: [11, "desc"],
    responsive: {
      details: {
        type: "column",

function toggleCheckbox(element, id) {
  if (element.checked === true) {
    $.ajax({
      type: "POST",
      contentType: "application/json",
      url: "/reclamations/addid",
      data: JSON.stringify(id),
      dataType: "json",
      success: function () {
        listedes_ids_reclamations.push(id);
        updatecheklist();
      }
    });
  } else {
    $.ajax({
      type: "POST",
      contentType: "application/json",
      url: "/reclamations/removeid",
      data: JSON.stringify(id),
      dataType: "json",
      success: function () {
        listedes_ids_reclamations =
          listedes_ids_reclamations.filter(el => el !== id);
        updatecheklist();
      }
    });
  }
}

  <script>
function loadCentrals() {
    const gouvernorat = document.getElementById("gouvernorat").value;
    const centralSelect = document.getElementById("centralrelclamtion");

    centralSelect.innerHTML = '<option value="">Central</option>';

    let url = '';

    if (!gouvernorat) {
        url = '/reclamations/centrals/all';
    } else {
        url = '/reclamations/centrals/by-gouvernorat?gouvernorat=' + encodeURIComponent(gouvernorat);
    }

    fetch(url)
        .then(response => response.json())
        .then(data => {
            data.forEach(central => {
                const option = document.createElement("option");
                option.value = central;
                option.text = central;
                centralSelect.appendChild(option);
            });

            $('#centralrelclamtion').trigger('change');
        })
        .catch(error => console.error('Error loading centrals:', error));
}
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    loadCentrals(); 
});
</script>
