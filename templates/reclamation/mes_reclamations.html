  <script>
function loadCentrals() {
    const gouvernorat = document.getElementById("gouvernorat").value;
    const centralSelect = document.getElementById("centralrelclamtion");

    centralSelect.innerHTML = '<option value="">Central</option>';

    let url = '';

    if (!gouvernorat) {
        url = '/reclamations/centrals/all';
    } else {
        url = '/reclamations/centrals/by-gouvernorat?gouvernorat=' + encodeURIComponent(gouvernorat);
    }

    fetch(url)
        .then(response => response.json())
        .then(data => {
            data.forEach(central => {
                const option = document.createElement("option");
                option.value = central;
                option.text = central;
                centralSelect.appendChild(option);
            });

            $('#centralrelclamtion').trigger('change');
        })
        .catch(error => console.error('Error loading centrals:', error));
}
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    loadCentrals(); 
});
</script>
