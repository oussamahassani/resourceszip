<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="layout">
<head>
<meta charset="UTF-8">
<title>Modifier Offre</title>
</head>
<body>
<section layout:fragment="content">
      <section class="content">
      <div class="card">
         <h4 class="card-title">Modifier un offre</h4>
        <div class="col-12 grid-margin">
            <div class=" row">
                <div class="card-body">
                 
                    <form id="myForm" class="form-sample" action="#" th:action="@{|/offre/updateOffre/${offre.offreId}|}" enctype="multipart/form-data" method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Nom d'offre</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control" name="nom" placeholder="Nom" th:field="${offre.title}"  th:required="required"/>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Type</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control" name="type" placeholder="type" th:field="${offre.type}" th:required="required"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 " id="offreParent">
                                  <div class="form-group row">
                        <label class="col-sm-3 col-form-label" 
                          >offre parent</label
                        >
                        <select
                          id="idOffre"
                          name="idOffre"
                          class="col-sm-9 form-control"
                          disabled
				          th:required="required"
                        >
                          <option value="">offre Base</option>
                        </select>
                        </div>
                      </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label"></label>
                                     <input type="checkbox" id="IsPromo" name="IsPromo" value="IsPromo" th:field="${offre.isPromo}"  onclick="chekIfIsPromo(event)">
                                     <label for="IsPromo">IsPromo</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                    <div class="form-group row">
                                    <label class="col-sm-3 col-form-label"></label>
                                     <input type="checkbox" id="isActive" name="isActive" value="isActive" th:field="${offre.isActive}">
                                   <label for="isActive">isActive</label>
                                </div>
                            </div>
                             <div class="col-md-4">
                                    <div class="form-group row">
                                    <label class="col-sm-3 col-form-label"></label>
                                     <input type="checkbox" id="isPrivate" name="isPrivate" value="true" th:field="${offre.isPrivate}">
                                   <label for="IsPrivate">IsPrivate</label>
                                </div>
                            </div>
  
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Date Debut Promo</label>
                                    <div class="col-sm-9">
                                        <input type="date" name="dateDebutPromo"  id="dateDebutPromo" th:value="${#dates.format(offre.dateDebutPromo, 'yyyy-MM-dd')}" required/>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Date Fin Promo</label>
                                    <div class="col-sm-9">
                                        <input type="date"  class="form-control" id="dateFinPromo" name="dateFinPromo" th:value="${#dates.format(offre.dateFinPromo, 'yyyy-MM-dd')}" required/>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group row">
                                    <label class="col-sm-3 col-form-label">Period validation de  Promo</label>
                                    <div class="col-sm-4">
                                        <input type="number"  id="periodeValidPromo" name="periodeValidPromo"  th:field="${offre.periodeValidPromo}" required> 
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 20px; text-align: center;">
                            <button type="submit" class="btn btn-success" style="margin-right: 20px;" id="buttonSave">Sauvegarder</button>
                            <button type="reset" class="btn btn-danger" style="margin-left: 20px;" >Réinitialiser</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
        </section>
      </section>
</body>
</html>

<script th:inline="javascript">

var offreIsPromo = /*[[${offre.isPromo}]]*/ false;
var idOffreBase = /*[[${offre.idOffreBase}]]*/ false;
var offreParentDiv = document.getElementById("offreParent");

if (offreIsPromo) {
    offreParentDiv.style.display = "block";
    findAllOffreParent()
    var desiredValue = idOffreBase;
    
    $("#dateDebutPromo").prop("disabled", false);
    $("#dateFinPromo").prop("disabled", false);
    $("#periodeValidPromo").prop("disabled", false);
    $("#idOffre").prop("disabled", false);
    
} else {
    offreParentDiv.style.display = "none";
    $("#dateDebutPromo").prop("disabled", true);
    $("#dateFinPromo").prop("disabled", true);
    $("#periodeValidPromo").prop("disabled", true);
    $("#idOffre").prop("disabled", true);
}
function chekIfIsPromo(event){
	if(event.target.checked){
		document.getElementById("offreParent").style.display = "block"; 
		findAllOffreParent()
		$("#dateDebutPromo").prop("disabled", false);
	    $("#dateFinPromo").prop("disabled", false);
	    $("#periodeValidPromo").prop("disabled", false);
	    $("#idOffre").prop("disabled", false);
	}
	else {
		document.getElementById("offreParent").style.display = "none"; 
		$("#dateDebutPromo").prop("disabled", true);
	    $("#dateFinPromo").prop("disabled", true);
	    $("#periodeValidPromo").prop("disabled", true);
	    $("#idOffre").prop("disabled", true);
	}
}



function findAllOffreParent() {

    $.get("/offre/offreParent" , function (data) {
      $("#idOffre").empty();
      var option = "<option value = ''>offre de base</option>";
    $("#idOffre").append(option);
      data.listeOffre.forEach(function (item, i) {
    	
        var option =
          "<option value = " +
          item.offreId +
          (item.offreId === idOffreBase ? ' selected' : '') + // Vérifiez si cela correspond à idOffreBase
          ">" +
          item.title +
          "</option>";
        $("#idOffre").append(option);
      });
    });
    $("#idOffre").val('253794');
}

$('#buttonSave').on('click', function(event) {
	 
	 var form = document.getElementById("myForm");
	 
	 if (form.checkValidity()) {
		 // Désactiver le bouton
	 
	  $(this).prop('disabled', true);
	  
	  // Ajouter la classe qui affiche le chargeur
	  $(this).addClass('disabled').html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Chargement en cours...');
	  	  
	  // Soumettre le formulaire
	  $(this).closest('form').submit();
	}
	});	 
</script>
