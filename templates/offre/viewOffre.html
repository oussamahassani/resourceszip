<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:th="http://www.w3.org/1999/xhtml" layout:decorator="layout">
<head>
<title>Detail Client</title>
</head>
<body>
	<section layout:fragment="content">
		<section class="content">
			<div class="container-fluid">
				<!-- Content Header (Page header) -->
				<div class="content-header">
					<div class="container-fluid">
						<div class="row mb-2">
							<div class="col-sm-12">
								<h1 class="m-0">Fiche Offre</h1>
							</div>
							<!-- /.col -->
						</div>
						<!-- /.row -->
					</div>
					<!-- /.container-fluid -->
				</div>

				<div class="row">
					<div class="col-12 grid-margin"></div>
					<div class="col-12">
						<div class="card card-primary card-outline card-outline-tabs">
							<div class="card-header p-0 border-bottom-0">
								<ul class="nav nav-tabs" id="custom-tabs-four-tab"
									role="tablist">
									<li class="nav-item"><a class="nav-link active"
										id="custom-tabs-info-tab" data-toggle="pill"
										href="#custom-tabs-info" role="tab"
										aria-controls="custom-tabs-info" aria-selected="true">Information Offre</a>
									</li>
									
								</ul>
							</div>
							<div class="card-body">
								<div class="tab-content" id="custom-tabs-four-tabContent">

									<div class="tab-pane fade active show" id="custom-tabs-info"
										role="tabpanel" aria-labelledby="custom-tabs-info-tab">

					
										
											<div class="row">
												<div class="col-sm-6">
													<div class="card-block">
														<div class="card-block-header">
															<h4>Informations principales</h4>
															<div class="card-block-body">
																<div class="row">
																	<label class="col-sm-4 col-form-label">Nom d'offre:</label>
																	<div class="col-sm-8" th:text="${offre.title}"></div>
																	
																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">is Active:</label>
																	<div class="col-sm-8" th:text="${offre.isActive}"></div>
																	
																</div>

																<div class="row">
																	<label class="col-sm-4 col-form-label">created Date:</label>
																	<div class="col-sm-8" th:text="${offre.createdDate}"></div>
																
																</div>
	                                                               <div class="row">
																	<label class="col-sm-4 col-form-label">isPromo:</label>
																	<div class="col-sm-8">
																	
																	
																		<span th:if="${offre.isPromo}" style="color:green">Oui</span>
																		<span th:unless="${offre.isPromo}" style="color:red">Non</span>
																	</div>
																	

																</div>
																    <div class="row">
																	<label class="col-sm-4 col-form-label">isPrivate:</label>
																	<div class="col-sm-8">
																	
																		<span th:if="${offre.isPrivate}" style="color:green">Oui</span>
																		<span th:unless="${offre.isPrivate}" style="color:red">Non</span>
																	</div>
																	

																</div>
																<div class="row">
																	<label class="col-sm-4 col-form-label">periode Validtion Promo:</label>
																	<div class="col-sm-8" th:text="${offre.periodeValidPromo}"></div>
																	
																</div>

																<div class="row">
																	<label class="col-sm-4 col-form-label">date Debut Promo:</label>
																	<div class="col-sm-8"
																		th:text="${offre.dateDebutPromo}"></div>
																	
																</div>

																<div class="row">																	
																	<label class="col-sm-4 col-form-label">date Fin Promo:</label>
																	<div class="col-sm-8"
																		th:text="${offre.dateFinPromo}"></div>
																	
																</div>

																<div class="row" th:if="${offre.type} != null" >
																	<label class="col-sm-4 col-form-label">type:</label>
																	<div class="col-sm-8" th:text="${offre.type}"></div>
																	
																</div>

															


														
															</div>
														</div>
													</div>

												</div>
												
											</div>
									</div>
								</div>
							</div>

						</div>
					</div>

				</div>
				
			</div>
		</section>
		
	</section>
</body>
</html>
