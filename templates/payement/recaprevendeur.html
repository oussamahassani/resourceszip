<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml" layout:decorator="layout">
<head>
<meta charset="UTF-8">
<title>Récapitulatif des revendeurs</title>
    <link rel="stylesheet" th:href="@{/css/customvariablestyle.css}" />
</head>
<body>
<section layout:fragment="content">
     <div class="content-header">
            <div class="container-fluid">
              <div class="row mb-2">
                <div class="col-sm-12">
                  <h1 class="m-0">Récapitulatif des revendeurs </h1>
                </div>
                <!-- /.col -->
              </div>
              <!-- /.row -->
            </div>
            <!-- /.container-fluid -->
          </div>
                      <div class="card">
            <div class="card-header">
      			<button
                    id="togglebutton"
                    class="d-none d-sm-inline-block btn btn-sm bg-oronge shadow-sm mb-3"
                  >
                    Filtre
                  </button>
            
                                   <button
                    id="downloadenmasse"
                    class="d-inline-block btn btn-sm btn-info shadow-sm mb-3"
                  >
                    Extraire recap
                  </button>


              
                                       <form
                    id="myForm"
                    class="form-sample"
                    method="GET"
                    action=""
                    style="display: none"
                  >
                        <input type="hidden" id="ExportRechercheNom" name="ExportRechercheNom"><br>
                        <input type="hidden" id="ExportRecherchePrenom" name="ExportRecherchePrenom"><br>
                        <input type="hidden" id="ExportRechercheRefUser"  name="ExportRechercheRefUser"><br>
                        <input type="hidden" id="ExportRechercheStatus"  name="ExportRechercheStatus"><br>
                         <input type="hidden" id="ExportRechercheGouvernorats"  name="ExportRechercheGouvernorats"><br>
                         <input type="hidden" id="ExportRechercheVilles"  name="ExportRechercheVilles"><br>
                         <input type="hidden" id="ExportRechercheVilles"  name="ExportRechercheVilles"><br>
                        <input type="hidden" id="ExportRechercheDistributeur"  name="ExportRechercheDistributeur"><br>
                         <input type="hidden" id="ExportRechercheDatedebut"  name="ExportRechercheDatedebut"><br>
                            <input type="hidden" id="ExportRechercheDatefin"  name="ExportRechercheDatefin"><br>
                    <!--        <div th:if = "${_csrf.parameterName">
                                       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                       </div>-->
                  </form>
                  
                  <form id="showMe3" method="post">
                    <div class="row">
  

                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="gouvernorat"
                          >Gouvernorat
                        </label>
                        <select
                         id="gouvernorat"
                          name="gouvernorat"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Gouvernorat</option>
                          <option
                            th:each="gouvernorat : ${gouvernorats}"
                            th:value="${gouvernorat.gouvernoratId}"
                            th:text="${gouvernorat.gouvernoratName}"
                          ></option>
                        </select>
                      </div>
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="villes"
                          >Ville</label
                        >
                        <select
                          id="villes"
                          name="villes"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Ville</option>
                        </select>
                      </div>

                      <div class="col-sm-6 col-md-3">
                       <label class="col-form-label" for="Nom"
                          >Nom</label>
                        <input
                          type="text"
                          name="Nom"
                          placeholder="Nom"
                          class="form-control"
                          th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
                      <div class="col-sm-6 col-md-3">
                          <label class="col-form-label" for="Prenom">Prenom</label>
                     
                        
                        <input
                        
                          type="text"
                          name="Prenom"
                          placeholder="Prenom"
                          class="form-control"
                         th:onchange="|onchangeSearch(event)|"
                        />
                      </div>


 
                      <div class="col-sm-6 col-md-3">
                        <label class="col-form-label" for="refUser"
                          >Référence</label
                        >
                        <input
                          id="refUser"
                          type="text"
                          name="refUser"
                          placeholder="Référence User"
                          class="form-control"
                           th:onchange="|onchangeSearch(event)|"
                        />
                      </div>
  
                      <div class="col-sm-6 col-md-3" sec:authorize="hasAnyAuthority('READ_RETAIL_SUMMARY_LIST_ALL')">
                        <label class="col-form-label" for="distributeur"
                          >Liste Distributeur
                        </label>
                        <select
                         id="distributeur"
                          name="distributeur"
                          class="form-control"
                         th:onchange="|onchangeSearch(event)|"
                        >
                          <option value="">Liste Distributeur</option>
                          <option
                            th:each="ld : ${listeDistributeur}"
                            th:value="${ld.userid}"
                            th:text="${ld.firstName}+' '+${ld.lastName}"
                          ></option>
                        </select>
                      </div>
                      
                       <div class="col-sm-6 col-md-4">
                        <label class="col-form-label" for="Status">Status (Activé / Désactivé)</label>
                        <select 
                          id="status"
                          name="status"
                          class="form-control"
                            th:onchange="|onchangeSearch(event)|"
                        >
                            <option value = ''>Status</option>
                        	<option value="true">Activé</option>
                        	<option value="false">Désactivé</option>
                        </select>
                      </div>
      
                    </div>
                   <!--  
                    <div class="row">
                      <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-5 col-form-label"> Date de création: du</label>
                                             <div class="col-sm-7">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de début"
                                                        name="datedebut" id="datedebut" 
                                                          th:onchange="|onchangeSearch(event)|" />
                                             </div>
                                         </div>
                       </div>
                      <div class="col-sm-6 col-md-3  mt-3">
                                         <div class="form-group row">
                                             <label class="col-sm-2 col-form-label">au</label>
                                             <div class="col-sm-7">
                                                 <input type="date" class="form-control"
                                                        placeholder="Choisissez une date de fin"
                                                        name="datefin" id="datefin" 
                                                        th:onchange="|onchangeSearch(event)|"  />
                                             </div>
                                         </div>
                       </div>
                 
                    </div>
                    -->
				<div class="text-center mt-2">
                        <button
                          class="d-none d-sm-inline-block btn btn-sm btn-success shadow-sm"
                          th:onclick="onclicksherh(event)"
                        >
                          Rechercher
                        </button>
                      </div>
                  </form>
                  </div>
                  </div>
 <div class="row">
            <div class="col-12">
              <div class="card shadow mb-4">
                <div class="card-body">
                  <div>
                    <div class="blocy">
                      <table
                        id="tutorialTable"
                        class="table table-bordered display supertable table-striped dataTable no-footer dtr-inline"
                      >
                        <!-- Header Table -->
                        <thead class="table dataTable no-footer">
                          <tr>
                                <th>Ref revendeur</th>
                                <th>Nom et prénom</th>
                               <th>Adresse</th>
                              <th>Plafond  revendeur</th>
                              <th>Chiffre d'affaire </th>  
                            <th>Montant total payé et versé</th>
                             <th>Montant total payé et non  versé </th>
                              <th>Atteinte</th>
                              <th>Action </th>
                          </tr>
                        </thead>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
                  <input
            type="hidden"
            name="message"
            id="message"
            th:value="${message} ?  ${message} : ''"
          />
       </section>
</body>
</html>

<script th:inline="javascript">
var token = $("meta[name='_csrf']").attr("content");
var parameterName = $("meta[name='_csrf_parameter']").attr("content");
var oTable;
const UNLOCK_RETAIL_SUMMARY = /*[[${UNLOCK_RETAIL_SUMMARY}]]*/ "default"; 

var READ_RETAIL_SUMMARY_DETAILS = /*[[${READ_RETAIL_SUMMARY_DETAILS}]]*/ "default";

let gouvernorat = ""  ; 
let  villes = ""  ; 
let Nom = "" ; 
let Prenom = "";
let refUser =  "" ; 
let distributeur =  "" ; 
let status =  "" ; 
let datedebut = "" ; 
let datefin = "" ; 
function onchangeSearch(event) {
    let name = event.target.name;
  
    switch (name) {
      case "gouvernorat": {
    
    	  gouvernorat = event.target.value;
    	  villes = "" ; 
    	  if (gouvernorat == "") villes = "";
        break;
      }
      case "villes":{
    	  villes = event.target.value;
    	

        break;
      }
      case "Nom": {
    	  Nom = event.target.value;
        break;
      }
      case "Prenom": {
    	  Prenom = event.target.value;
    	  break;
      }

      case "refUser": {
    	  refUser = event.target.value;
        break;
      }
      case "distributeur": {
    	  distributeur = event.target.value;
        break;
      }
      case "status": {
    	  status = event.target.value;
        break;
      }
      case "datedebut": {
    	  datedebut = event.target.value;
        break;
      }
      case "datefin": {
    	  datefin = event.target.value;
        break;
      }


    }
  }
$("#togglebutton").click(function () {
    $("#showMe3").toggle();
  });

$("#gouvernorat").change(function () {
    sendAjaxRequest();
  });
  
function sendAjaxRequest() {
    var villeid = $("#gouvernorat").val();
    if (villeid === "") {
      $("#villes").empty();
      var option = "<option value = ''>Ville</option>";
      $("#villes").append(option);
    } else {
      $.get("/client/getgouvernorats/" + villeid, function (data) {
        $("#villes").empty();
        var option = "<option value = ''>Ville</option>";
      $("#villes").append(option);
        data.forEach(function (item, i) {
          var option =
            "<option value = " +
            item.villeId +
            ">" +
            item.villeName +
            "</option>";
          $("#villes").append(option);
        });
      });
    }
  }
var messagenotif = document.getElementById("message").value;
if(messagenotif !== "" && messagenotif == "isnoteactive"){
    $(document).Toasts("create", {
	        title: "utilisateur Desactiver:",
	        body: "",
	        class: "bg-danger",
	        autohide: true,
	        delay: 10000,
	      });
    }
if(messagenotif !== "" && messagenotif == "isactive"){
    $(document).Toasts("create", {
	        title: "utilisateur Activer:",
	        body: "",
	        class: "bg-success",
	        autohide: true,
	        delay: 10000,
	      });
    }
function onclicksherh(event) {
    //event.preventdefault()
    event.preventDefault();

    //$('#tutorialTable').DataTable().ajax.reload();
    $("#tutorialTable")
      .DataTable()
      .column(0)
      .search(
        JSON.stringify({
         gouvernorat: gouvernorat,
         villes: villes,
         Nom: Nom,
         Prenom: Prenom,
         refUser: refUser,
         distributeur: distributeur,
         status: status,
         datedebut:datedebut,
         datefin:datefin,
          
        })
      )
      .draw();
  }
  
  
oTable = $("#tutorialTable").DataTable({
    processing: true,
    serverSide: true,
    ordering: true,
    order: [3, "desc"],
    responsive: {
      details: {
        type: "column",
      },
    },
    searching: true,
    fixedHeader: true,
    ajax: "/payement/recaperevendeur",
    lengthMenu: [
    	[10, 20, 50 , 100 , 200,500],
    	[10, 20, 50 , 100 , 200,500],
    ],

    language: {
      lengthMenu: "Affichage _MENU_ par page",
      zeroRecords: "Rien trouvé - désolé",
      emptyTable: "aucune donnée disponible",
      info: "Afficher _START_ -  _END_ de _TOTAL_ entrées ",
      infoEmpty: "Aucun enregistrement disponible",
      paginate: {
        first: "Première",
        last: "Dernière",
        next: ">>",
        previous: "<<",
      },
      search: "Chercher:",
    },
    initComplete: function (json) {

        document.getElementById("tutorialTable_filter").style.display = "none";
    },

    columnDefs: [
      {
        className: "dtr-control",
        orderable: false,
        targets: 0,
      },
    ],

    columns: [
        {
            data: null,
            render: function (data, type, row) {
            	if(row.code_user)
              return row.code_user  ;
            	return "";
             
            },
          },
          {
              data: null,
              render: function (data, type, row) {
              	if(row.lastname &&  row.firstname )
              		return  row.firstname + "  " + row.lastname ;
              	if(row.lastname)
              		
                 return row.lastname;
              	else if(row.firstname) 
              		
              		return row.firstname;
              },
            },
          

            {
              data: null,
              render: function (data, type, row) {
              if(row.adresse)
              	return row.adresse ;
              	return "";
              }

            },
            {
                data: null,
                render: function (data, type, row) {
                if(row.plafon_revendeur){
                
                    	return row.plafon_revendeur.toFixed(3);
                
                	}
                
                	
                	return "0";
                }

              },

      {
        data: null,
        render: function (data, type, row) {
        	if(row.montant){
        		if(row.totalAvoir)
        		{
        		return Number(row.montant.toFixed(3)) - Number(row.totalAvoir.toFixed(3))
        		}
          return Number(row.montant).toFixed(3)  ;
        	}
        	return "0";
         
        },
      },

        {
            data: null,
            render: function (data, type, row) {
            	if(row.montantpayer){
            		if(row.avoirConsomme){
            			return Number(row.montantpayer.toFixed(3)) - Number(row.avoirConsomme.toFixed(3))	
            		}
            	
            		   return Number(row.montantpayer.toFixed(3)) ;	
            	}
            		
           
            	return "0";
             
            },
          },
      {
          data: null,
          render: function (data, type, row) {
          	if(row.montantnonpayer){
          		
          	let avoirNonPayee =  Number(row.totalAvoir.toFixed(3)) - Number(row.avoirConsomme.toFixed(3))
          	   return row.montantnonpayer.toFixed(3) - avoirNonPayee ;
          	}
         
          	return "0";
           
          },
        },

        {
            data: null,
            render: function (data, type, row) {

            if(row.plafon_revendeur != null && row.montant != null  &&  row.montantpayer!= null ){
                                                          
            	var calcule  = ((row.montantnonpayer -  (row.totalAvoir - row.avoirConsomme )) / row.plafon_revendeur *100).toFixed(3);
            	var colorcalcule = "bg-success"
            	var	 poucentprogrss="20%"
            		if(calcule <= 50 && calcule > 30 )
            			{
            			 poucentprogrss="40%"
            				 colorcalcule=" bg-info"
            			}
            	if(calcule <= 70 && calcule > 50 ){
            		 colorcalcule = "bg-primary"
            			 poucentprogrss="65%"
            	}
            			if(calcule <= 100 && calcule > 70 )
            				{
            				colorcalcule="bg-warning"
            				poucentprogrss="85%"
            				}
            				
            				if(calcule > 100){
            					colorcalcule="bg-danger"
            					poucentprogrss = "100%"
            				}
            					
            					
            	var htmlcaclul = "<span>"+calcule +   "</span>";
            	 var progressbar = `<div class="progress">
            	 <div class="progress-bar `+colorcalcule+`  progress-bar-striped" role="progressbar" aria-valuenow="`+calcule+`" aria-valuemin="0" aria-valuemax="100" style="width: `+poucentprogrss+`">
            	 <span class="sr-only">`+calcule+`% Complete (success)</span>
            	 </div>
            	 </div>`
            	return "<div>" +  htmlcaclul  + progressbar +"</div>"
            }
            	else
            	return "";
            }

          },
     
          {
              data: null,
              render: function (data, type, row) {
            	  let msg_is_locked = '<h3 >Etes vous sure de vouloir Desactiver cette User ?</h3>'
            	  let btn_is_locked = "Désactiver" 
            			  if(row.enabled){
            				  msg_is_locked =   '<h3 >Etes vous sure de vouloir Activer cette User ?</h3>'
            				  btn_is_locked ='Activer'
            			  }
            	  let dataaction  =  `<a  data-toggle="modal" 
                      data-target='#modal-warning`+row.userid+`'>
                      <button type="button" class="d-none d-sm-inline-block btn btn-sm btn-danger shadow-sm"
                      >`+btn_is_locked+`</button>
                  </a>
                  
                        <div class="modal modal-warning fade in" data-backdrop="false" tabindex="-1" role="dialog" id="modal-warning`+row.userid+`" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                        <span aria-hidden="true">×</span></button>
                                </div>
                                <div  class="modal-body">
                                  
                                    `+msg_is_locked+`
                                </div>
                                <div class="modal-footer">
                                    <form action="/RevendeurUser/revendeurEnableDisableFromRecap/`+row.userid+`" method="POST">
                                        <button type="button" class="btn btn-outline pull-left" data-dismiss="modal">Non</button>
                                        <div >
                                        <input type="hidden" value=`+row.bordereauid+` name="idbordereau">
                                            <button th:case="true" type="submit" class="btn btn-danger" ><i class="fa fa-check"></i>&nbsp;Oui</button>
                                           
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div> 
                  </div>
                  
                  `
                  let detaildataaction = `<a  href='/payement/viewDetailsRecap/`+row.userid+`'>
                  <button type="button" class="d-none d-sm-inline-block btn btn-sm btn-info shadow-sm">Détails revendeur</a>`;

                    if(READ_RETAIL_SUMMARY_DETAILS && UNLOCK_RETAIL_SUMMARY)
            	  return dataaction +  detaildataaction;
                else if(READ_RETAIL_SUMMARY_DETAILS && !UNLOCK_RETAIL_SUMMARY)
                return detaildataaction
                else if(!READ_RETAIL_SUMMARY_DETAILS && UNLOCK_RETAIL_SUMMARY)
                return dataaction
                else return ""
                
            	 
              }

            },




    ],

  });
  
$("#downloadenmasse").click(function (e) {
    e.preventDefault();

    document.getElementById("ExportRechercheNom").value = Nom;
    document.getElementById("ExportRecherchePrenom").value = Prenom;
    document.getElementById("ExportRechercheRefUser").value = refUser;
    document.getElementById("ExportRechercheStatus").value = status;
    document.getElementById("ExportRechercheGouvernorats").value = gouvernorat;
    document.getElementById("ExportRechercheVilles").value = villes;
    document.getElementById("ExportRechercheDistributeur").value = distributeur;
    document.getElementById("ExportRechercheDatedebut").value = datedebut;
    document.getElementById("ExportRechercheDatefin").value = datefin;
    
      var url = "/payement/extractenmasse";
      $("#myForm").attr("action", url);
      $("#myForm").submit();


  });
</script>
