<script>
	var packsss='';
	$(document).on('change', '#newProductSelect', function() {
    var selectedOffreId = $(this).val();
    if (selectedOffreId) {
        $.ajax({
            type: 'GET',
            url: '/pack/getpack/' + selectedOffreId,
            success: function(packs) {
                $('#packSelect').empty();
                $('#packSelect').append('<option value="" style="text-align:center;">Sélectionner un pack...</option>');
                packsss=packs;
                packs.forEach(function(pack) {
					  if (pack.categoriePack?.categorieProduitInternetNom !== 'ADSL') {
                        $('#packSelect').append('<option style="text-align:center;" value="' + pack.packId + '">' + pack.title + ' - ' + pack.categoriePack.categorieProduitInternetNom + '-' + pack?.debitPack + '</option>');
                    }
               
                });
                $('#demandeMigrationButton').prop('disabled', true);
            },
            error: function(error) {
                console.error('Error fetching packs:', error);
                $('#demandeMigrationButton').prop('disabled', true);
            }
        });
    } else {
        $('#packSelect').empty();
        $('#packSelect').append('<option value="" style="text-align:center;">Sélectionner un pack...</option>');
        $('#demandeMigrationButton').prop('disabled', true);
    }
});

$(document).on('change', '#packSelect', function() {
    var selectedPackId = $(this).val();
    if (selectedPackId) {
        $('#demandeMigrationButton').prop('disabled', false);
    } else {
        $('#demandeMigrationButton').prop('disabled', true);
    }
});

 
	function searchClient() {
    const reference = document.getElementById('referenceChifco').value;

    if (reference.trim() === '') {
        alert('Please enter a client reference.');
        return;
    }
 var isAdministr = document.getElementById('isadmin').value == 'true';
    fetch(`/operationAbonnement/rechercheficheabonnementpourmigrationwithref?reference=${reference}`)
        .then(response => response.json())
        .then(data => {
            const clientResult = document.getElementById('clientResult');
            clientResult.innerHTML = ''; 

            if (data.length === 0) {
				 if (isAdministr) {
                        clientResult.innerHTML = '<p style="color:red;">Aucun client ou opération en cours</p>';
                    } else {
                        clientResult.innerHTML = '<p style="color:red;">Client n\'appartient pas à votre liste ou opération en cours </p>';
                    }
      
                 $('#secondCard').hide();   
                return;
            }

            data.forEach(client => {
         
                loadClientDetails(client.clientid);
                console.log("under load client details"+client.clientid);
            });
        })
}
