<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorator="~{layout.html}">
<head>

    <title>Resultat de l'imporation modem</title>

</head>

<body id="page-top">
<section layout:fragment="content">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">                           
                            <h1 class="m-0">
                            <span><a  th:href="@{antivirus_keys_page}"><button class="btn btn-primary mr-3">Retour</button></a></span>
                            	Résultat de l'importation de la clé antivirus
                            </h1>
                        </div><!-- /.col -->
                    </div><!-- /.row -->
                </div><!-- /.container-fluid -->
            </div>
            
<section class="card m-2 p-2">
<div class="row">

    <div class="col-md-4">
    	<h3 class="text-success">Clé ajoutés avec succès : <span th:text="${nombreKeysValide}"></span> </h3>
		<table class="table table-striped table-hover">
		  <thead>
		    <tr>
		      <th>Clé</th>
		    </tr>
		  </thead>
		  <tbody>
			<tr th:if="${nombreKeysValide} == 0" class="text-center"><td colspan="6" >Aucun clé ajouté</td></tr>
		    <tr th:each="key : ${keysValid}">
		      <td th:text="${key.licenseKey}"></td>	      
		    </tr>
		  </tbody>
		</table>
    </div>
    
    <div class="col-md-4">
		<h3 class="text-danger">Clé en échec : <span th:text="${nombreKeysNonValide}"></span> </h3>
		<table class="table table-striped table-hover">
		  <thead>
		    <tr>
		      <th>Clé</th>
		    </tr>
		  </thead>
		  <tbody>
		  	<tr th:if="${nombreKeysNonValide} == 0" class="text-center"><td colspan="6" >Aucun clé en échec</td></tr>
		    <tr th:each="key : ${keysNonValid}">
		      <td th:text="${key.licenseKey}"></td>	      
		    </tr>
		  </tbody>
		</table>
    </div>
    
    <div class="col-md-4">
	<h3 class="text-danger"> les doublons dans fichier excel</span> </h3>
		<table class="table table-striped table-hover">
		  <thead>
		    <tr>
		      <th>clé</th>
		    </tr>
		  </thead>
		  <tbody>
		  	<tr th:if="${nombrekeysNotValidInExcel} == 0" class="text-center"><td colspan="6" >Aucun clé doublons</td></tr>
		    <tr th:each="key : ${keysNotValidInExcel}">
		      <td th:text="${key.licenseKey}"></td>	      
		    </tr>
		  </tbody>
		</table>
    </div>

</div>
</section>
</section>
</body>

</html>
